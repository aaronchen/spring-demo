# ================================================================
# ValidationMessages.properties — Bean Validation error messages
# Used by Hibernate Validator for @NotBlank, @Size, @NotNull, etc.
# Reference with {key} syntax inside constraint annotations.
# {min}, {max}, {value} are interpolated by Hibernate Validator.
# ================================================================

project.name.notBlank=Project name is required
project.name.size=Project name must be between {min} and {max} characters
project.description.size=Project description cannot exceed {max} characters

task.title.notBlank=Title is required
task.title.size=Title must be between {min} and {max} characters

task.description.size=Description cannot exceed {max} characters

comment.text.notBlank=Comment text is required
comment.text.size=Comment cannot exceed {max} characters

tag.name.notBlank=Tag name is required
tag.name.size=Tag name cannot exceed {max} characters
tag.name.unique=A tag with this name already exists

validation.unique=Already exists

user.name.notBlank=Name is required
user.name.size=Name cannot exceed {max} characters
user.email.notBlank=Email is required
user.email.size=Email cannot exceed {max} characters
user.email.invalid=Please enter a valid email address
user.email.unique=An account with this email already exists
user.password.notBlank=Password is required
user.password.size=Password must be between {min} and {max} characters

profile.password.current.notBlank=Current password is required
profile.password.confirm.notBlank=Password confirmation is required

savedView.name.notBlank=View name is required
savedView.filters.notBlank=Filters are required
