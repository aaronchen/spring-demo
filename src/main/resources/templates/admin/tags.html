<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.admin.tags}, null)}"></head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{layouts/base :: navbar}"></div>

    <main class="container flex-grow-1 mb-4">
        <h1 class="display-4 mb-4" th:text="#{admin.tags.heading}">Tag Management</h1>

        <div th:replace="~{admin/tag-table}"></div>
    </main>

    <div th:replace="~{layouts/base :: footer}"></div>
    <div th:replace="~{layouts/base :: scripts}"></div>

    <script th:inline="javascript">
        document.body.addEventListener('tagDeleted', function() {
            showToast(APP_CONFIG.messages['toast.admin.tags.deleted'], 'success');
            htmx.ajax('GET', '/admin/tags', {target: '#tag-management-content', swap: 'outerHTML'});
        });
    </script>
</body>
</html>
