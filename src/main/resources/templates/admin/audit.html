<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.admin.audit}, '/css/audit.css')}"></head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{layouts/base :: navbar}"></div>

    <main class="container flex-grow-1 mb-4" data-controller="audit">
        <h1 class="display-4 mb-4" th:text="#{admin.audit.heading}">Audit Log</h1>

        <!-- Filters row -->
        <div class="row g-3 mb-4 align-items-center">

            <!-- Category dropdown -->
            <div class="col-md-auto dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle audit-category-btn"
                        type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-funnel"></i>
                    <span data-audit-target="categoryLabel" th:text="#{admin.audit.filter.all}">All</span>
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item audit-category-item active" href="#"
                           data-category=""
                           data-action="click->audit#filterCategory"
                           th:text="#{admin.audit.filter.all}">All</a></li>
                    <li th:each="cat : ${categories}">
                        <a class="dropdown-item audit-category-item" href="#"
                           th:data-category="${cat.toLowerCase()}"
                           data-action="click->audit#filterCategory"
                           th:text="#{${'admin.audit.filter.' + cat.toLowerCase()}}">Category</a>
                    </li>
                </ul>
            </div>

            <!-- Search -->
            <div class="col-md-4">
                <div class="position-relative">
                    <input type="text" data-audit-target="searchInput"
                           class="form-control form-control-sm"
                           data-action="input->audit#search"
                           th:placeholder="#{admin.audit.search.placeholder}"
                           placeholder="Search by user or details...">
                    <button type="button" data-audit-target="searchClear"
                            class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-muted d-none audit-search-clear-btn"
                            data-action="click->audit#clearSearch"
                            th:title="#{admin.audit.search.clear}"
                            title="Clear search">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Date range -->
            <div class="col-md-auto d-flex align-items-center gap-2">
                <label for="audit-date-from" class="form-label mb-0 text-nowrap"
                       th:text="#{admin.audit.date.from}">From</label>
                <input type="date" id="audit-date-from" data-audit-target="dateFrom"
                       class="form-control form-control-sm date-range-start"
                       data-date-min-for="audit-date-to" style="width: auto;"
                       data-action="change->audit#filterDateFrom">
                <label for="audit-date-to" class="form-label mb-0 text-nowrap"
                       th:text="#{admin.audit.date.to}">To</label>
                <input type="date" id="audit-date-to" data-audit-target="dateTo"
                       class="form-control form-control-sm" style="width: auto;"
                       data-action="change->audit#filterDateTo">
            </div>
        </div>

        <!-- Audit table (HTMX target) -->
        <div id="audit-view" data-audit-target="view"
             data-action="pagination:navigate->audit#navigate pagination:resize->audit#resize">
            <div th:replace="~{admin/audit-table}"></div>
        </div>
    </main>

    <div th:replace="~{layouts/base :: footer}"></div>
    <div th:replace="~{layouts/base :: scripts}"></div>
</body>
</html>
