<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.admin.users}, null)}"></head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{layouts/base :: navbar}"></div>

    <main class="container flex-grow-1 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-4 mb-0" th:text="#{admin.users.heading}">User Management</h1>
            <button class="btn btn-primary"
                    th:hx-get="${appRoutes.adminUsersNew}" hx-target="#user-modal-content" hx-swap="innerHTML">
                <i class="bi bi-plus-circle"></i> <span th:text="#{admin.users.create}">New User</span>
            </button>
        </div>

        <div class="mb-3">
            <input type="search" class="form-control"
                   id="admin-user-search"
                   th:placeholder="#{user.search.placeholder}"
                   th:hx-get="${appRoutes.adminUsers}"
                   hx-target="#user-table-content"
                   hx-swap="outerHTML"
                   hx-trigger="input changed delay:300ms, search"
                   name="search">
        </div>

        <div th:replace="~{admin/user-table}"></div>
    </main>

    <!-- User Create/Edit Modal -->
    <div class="modal fade" id="user-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" id="user-modal-content">
            </div>
        </div>
    </div>

    <div th:replace="~{layouts/base :: footer}"></div>
    <div th:replace="~{layouts/base :: scripts}"></div>

    <script type="module">
        import { showConfirm } from 'lib/confirm';
        import { requireOk } from 'lib/api';
        import { t } from 'lib/i18n';
        import { showToast } from 'lib/toast';
        (function() {
            const userModal = document.getElementById('user-modal');
            let bsModal = null;

            // Show modal when content is loaded via HTMX
            document.body.addEventListener('htmx:afterSwap', function(e) {
                if (e.detail.target.id === 'user-modal-content') {
                    if (!bsModal) bsModal = new bootstrap.Modal(userModal);
                    bsModal.show();
                }
            });

            function refreshTable() {
                const search = document.getElementById('admin-user-search').value;
                const url = search
                    ? APP_CONFIG.routes.adminUsers.query({search}).build()
                    : APP_CONFIG.routes.adminUsers.build();
                htmx.ajax('GET', url, {target: '#user-table-content', swap: 'outerHTML'});
            }

            // Refresh table and close modal on save
            document.body.addEventListener('userSaved', function() {
                if (bsModal) bsModal.hide();
                showToast(t('toast.admin.users.saved'));
                refreshTable();
            });

            // Password reset event
            document.body.addEventListener('passwordReset', function() {
                showToast(t('toast.admin.users.passwordReset'));
            });

            // Reset password button handler
            document.body.addEventListener('click', function(e) {
                const btn = e.target.closest('.user-reset-pw-btn');
                if (!btn) return;

                const userId = btn.dataset.userId;
                const userName = btn.dataset.userName;
                const inputId = 'reset-pw-input';
                const errorId = 'reset-pw-error';

                showConfirm({
                    title: t('admin.users.resetPassword.title', userName),
                    message: `<div>
                        <label class="form-label fw-bold form-label-required">${t('admin.users.resetPassword.label')}</label>
                        <input type="password" id="${inputId}" class="form-control"
                               autocomplete="new-password"
                               placeholder="${t('admin.users.field.password.placeholder')}">
                        <div id="${errorId}" class="text-danger small mt-1" style="display:none"></div>
                    </div>`,
                    confirmText: t('admin.users.resetPassword.submit'),
                    headerClass: 'bg-danger text-white',
                    confirmClass: 'btn btn-danger'
                }, function() {
                    const pw = document.getElementById(inputId).value;
                    if (pw.length < 8 || pw.length > 72) {
                        const errEl = document.getElementById(errorId);
                        errEl.textContent = t('user.password.size');
                        errEl.style.display = '';
                        return false;
                    }
                    htmx.ajax('POST', APP_CONFIG.routes.adminUserResetPassword.params({userId}).build(),
                        {swap: 'none', values: {password: pw}});
                });
            });

            // Remove/Disable/Delete button handler — fetches user info to decide action
            document.body.addEventListener('click', function(e) {
                const btn = e.target.closest('.user-remove-btn');
                if (!btn) return;

                const userId = btn.dataset.userId;
                const userName = btn.dataset.userName;

                fetch(APP_CONFIG.routes.adminUserInfo.params({userId}).build())
                    .then(requireOk)
                    .then(r => r.json())
                    .then(function(info) {
                        if (info.isSelf) {
                            showToast(t('admin.users.self.cannotRemove'), 'warning');
                            return;
                        }
                        if (info.canDelete) {
                            let confirmMsg = t('admin.users.delete.confirm');
                            if (info.assignedTasks > 0) {
                                confirmMsg += ` ${t('admin.users.delete.taskWarning', info.assignedTasks)}`;
                            }
                            showConfirm({
                                message: confirmMsg,
                                title: t('admin.users.delete.title', userName),
                                confirmText: t('action.delete'),
                                headerClass: 'bg-danger text-white',
                                confirmClass: 'btn btn-danger'
                            }, function() {
                                htmx.ajax('DELETE', APP_CONFIG.routes.adminUserDelete.params({userId}).build(), {swap: 'none'});
                            });
                        } else if (!info.canDisable) {
                            showToast(t('admin.users.soleOwner.cannotRemove'), 'warning');
                        } else {
                            const parts = [];
                            if (info.completedTasks > 0) {
                                parts.push(t('admin.users.disable.completedTasks', info.completedTasks));
                            }
                            if (info.comments > 0) {
                                parts.push(t('admin.users.disable.comments', info.comments));
                            }
                            if (info.recurringTemplates > 0) {
                                parts.push(t('admin.users.disable.recurringTemplates', info.recurringTemplates));
                            }
                            let disableMsg = t('admin.users.disable.confirm', parts.join(', '));
                            if (info.assignedTasks > 0) {
                                disableMsg += ` ${t('admin.users.disable.taskWarning', info.assignedTasks)}`;
                            }
                            showConfirm({
                                message: disableMsg,
                                title: t('admin.users.disable.title', userName),
                                confirmText: t('admin.users.action.disable'),
                                headerClass: 'bg-warning',
                                confirmClass: 'btn btn-warning'
                            }, function() {
                                htmx.ajax('POST', APP_CONFIG.routes.adminUserDisable.params({userId}).build(), {swap: 'none'});
                            });
                        }
                    })
                    .catch(err => console.error('Failed to load user info:', err));
            });
        })();
    </script>
</body>
</html>
