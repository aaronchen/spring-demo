<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.dashboard}, null)}"></head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <div th:replace="~{layouts/base :: navbar}"></div>
    <th:block th:replace="~{layouts/base :: chrome}" />

    <!-- Dashboard -->
    <main class="container flex-grow-1"
          data-controller="dashboard"
          th:data-dashboard-ws-project-ids-value="${#strings.listJoin(wsProjectIds, ',')}">
        <!-- Welcome Banner -->
        <div class="row align-items-center mb-4 mt-3">
            <div class="col">
                <h2 th:text="#{dashboard.welcome(${currentUser?.name})}">Welcome back, Alice</h2>
            </div>
            <div class="col-auto d-flex gap-2">
                <a th:if="${!stats.editableProjects.isEmpty()}"
                   th:href="@{/tasks/new}"
                   class="btn btn-primary btn-lg">
                    <i class="bi bi-plus-circle"></i>
                    <span th:text="#{dashboard.action.newTask}">New Task</span>
                </a>
                <a th:href="@{/tasks(selectedUserId=${currentUser?.id})}" class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-list-check"></i>
                    <span th:text="#{dashboard.action.myTasks}">My Tasks</span>
                </a>
            </div>
        </div>

        <div th:replace="~{dashboard/dashboard-stats}"></div>
    </main>

    <!-- Footer -->
    <div th:replace="~{layouts/base :: footer}"></div>

    <!-- Scripts -->
    <div th:replace="~{layouts/base :: scripts}"></div>

</body>
</html>
