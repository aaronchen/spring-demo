<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.dashboard}, null)}"></head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <div th:replace="~{layouts/base :: navbar}"></div>

    <!-- Dashboard -->
    <main class="container flex-grow-1">
        <!-- Welcome Banner -->
        <div class="row align-items-center mb-4 mt-3">
            <div class="col">
                <h2 th:text="#{dashboard.welcome(${currentUser?.name})}">Welcome back, Alice</h2>
            </div>
            <div class="col-auto d-flex gap-2">
                <a th:if="${!stats.editableProjects.isEmpty()}"
                   th:href="@{/tasks/new}"
                   class="btn btn-primary btn-lg">
                    <i class="bi bi-plus-circle"></i>
                    <span th:text="#{dashboard.action.newTask}">New Task</span>
                </a>
                <a th:href="@{/tasks(selectedUserId=${currentUser?.id})}" class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-list-check"></i>
                    <span th:text="#{dashboard.action.myTasks}">My Tasks</span>
                </a>
            </div>
        </div>

        <div th:replace="~{dashboard/dashboard-stats}"></div>
    </main>

    <!-- Footer -->
    <div th:replace="~{layouts/base :: footer}"></div>

    <!-- Scripts -->
    <div th:replace="~{layouts/base :: scripts}"></div>

    <meta name="_wsProjectIds" th:content="${#strings.listJoin(wsProjectIds, ',')}">
    <script>
        (function() {
            const statsContainer = document.getElementById('dashboard-stats');

            if (!window.stompClient || !statsContainer) return;

            function refreshStats() {
                htmx.ajax('GET', `${APP_CONFIG.routes.dashboard}/stats`,
                    {target: '#dashboard-stats', swap: 'outerHTML'});
            }

            const wsProjectIds = document.querySelector('meta[name="_wsProjectIds"]')?.content;
            window.stompClient.onConnect(function(client) {
                if (wsProjectIds) {
                    wsProjectIds.split(',').forEach(function(id) {
                        client.subscribe(
                            APP_CONFIG.routes.topicProjectTasks.resolve({ projectId: id.trim() }),
                            function() { refreshStats(); });
                    });
                }

                client.subscribe(APP_CONFIG.routes.topicPresence.toString(), function() {
                    refreshStats();
                });
            });
        })();
    </script>
</body>
</html>
