<!-- Shared form fields fragment — included by task.html (full page) and task-modal.html (HTMX modal).
     th:object must be set on the enclosing <form> in the including template.
     mode='view' disables all fields for read-only display; the layout is otherwise identical. -->
<th:block th:fragment="fields" xmlns:th="http://www.thymeleaf.org">

    <!-- Title Field -->
    <div class="mb-3">
        <label for="title" class="form-label fw-bold">
            <span th:text="#{task.field.title}">Title</span>
            <span class="text-danger" th:if="${mode != 'view'}">*</span>
        </label>
        <input type="text"
               th:field="*{title}"
               class="form-control"
               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
               th:placeholder="#{task.field.title.placeholder}"
               th:disabled="${mode == 'view'}">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
            Title error
        </div>
    </div>

    <!-- Description Field -->
    <div class="mb-3">
        <label for="description" class="form-label fw-bold" th:text="#{task.field.description}">Description</label>
        <textarea th:field="*{description}"
                  class="form-control"
                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"
                  rows="4"
                  th:placeholder="#{task.field.description.placeholder}"
                  th:disabled="${mode == 'view'}"></textarea>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">
            Description error
        </div>
    </div>

    <!-- Assigned To: searchable dropdown (remote) in create/edit mode, disabled in view mode -->
    <div class="mb-3">
        <label for="userId" class="form-label fw-bold" th:text="#{task.field.user}">Assigned To</label>
        <searchable-select name="userId" id="userId"
                           src="/api/users" value-field="id" text-field="name"
                           th:placeholder="#{task.field.user.placeholder}"
                           th:disabled="${mode == 'view'}">
            <option value="" th:text="#{task.field.user.unassigned}">Unassigned</option>
            <option th:if="${task.user != null}"
                    th:value="${task.user.id}"
                    th:text="${task.user.name}"
                    selected>Selected User</option>
        </searchable-select>
    </div>

    <!-- Tag Checkboxes -->
    <!-- tags list is added to the model by the web controller for all form pages -->
    <div class="mb-3" th:if="${tags != null}">
        <label class="form-label fw-bold" th:text="#{task.field.tags}">Tags</label>
        <div class="d-flex flex-wrap gap-2">
            <div th:each="tag : ${tags}" class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox"
                       th:id="'tag-' + ${tag.id}"
                       name="tagIds"
                       th:value="${tag.id}"
                       th:checked="${task.tags != null && task.tags.contains(tag)}"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" th:for="'tag-' + ${tag.id}" th:text="${tag.name}">Tag</label>
            </div>
        </div>
    </div>

    <!-- Completed Toggle — shown in edit and view mode, hidden on create -->
    <div th:if="${mode != 'create'}">
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="completed"
                   th:field="*{completed}"
                   th:disabled="${mode == 'view'}">
            <label class="form-check-label" for="completed">
                <strong th:text="#{action.markAsCompleted}">Mark as completed</strong>
            </label>
        </div>
    </div>

</th:block>
