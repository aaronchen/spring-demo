<!--/* Shared form fields fragment — included by task.html (full page) and task-modal.html (HTMX modal).
     th:object must be set on the enclosing <form> in the including template.
     mode='view' disables all fields for read-only display; the layout is otherwise identical. */-->
<th:block th:fragment="fields" xmlns:th="http://www.thymeleaf.org">

    <input type="hidden" th:field="*{version}">

    <!-- Title -->
    <div class="mb-3">
        <label for="title" class="form-label fw-bold"
               th:classappend="${mode != 'view'} ? 'form-label-required'"
               th:text="#{task.field.title}">Title</label>
        <input type="text"
               th:field="*{title}"
               class="form-control"
               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
               th:placeholder="#{task.field.title.placeholder}"
               th:disabled="${mode == 'view'}">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
            Title error
        </div>
    </div>

    <!-- Description -->
    <div class="mb-3">
        <label for="description" class="form-label fw-bold" th:text="#{task.field.description}">Description</label>
        <textarea th:field="*{description}"
                  class="form-control"
                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"
                  rows="4"
                  th:placeholder="#{task.field.description.placeholder}"
                  th:disabled="${mode == 'view'}"></textarea>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">
            Description error
        </div>
    </div>

    <!-- Status -->
    <div class="mb-3" th:if="${mode != 'create'}">
        <label class="form-label fw-bold" th:text="#{task.field.status}">Status</label>
        <div class="d-flex gap-3">
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{status}" value="OPEN" id="status-open"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" for="status-open">
                    <span class="badge bg-secondary"><i class="bi bi-circle"></i> <span th:text="#{task.status.open}">Open</span></span>
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{status}" value="IN_PROGRESS" id="status-in-progress"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" for="status-in-progress">
                    <span class="badge bg-warning text-dark"><i class="bi bi-play-circle-fill"></i> <span th:text="#{task.status.inProgress}">In Progress</span></span>
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{status}" value="COMPLETED" id="status-completed"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" for="status-completed">
                    <span class="badge bg-success"><i class="bi bi-check-circle-fill"></i> <span th:text="#{task.status.completed}">Completed</span></span>
                </label>
            </div>
        </div>
    </div>

    <!-- Priority -->
    <div class="mb-3">
        <label class="form-label fw-bold" th:text="#{task.field.priority}">Priority</label>
        <div class="d-flex gap-3">
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{priority}" value="LOW" id="priority-low"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" for="priority-low">
                    <span class="badge bg-success"><i class="bi bi-reception-1"></i> <span th:text="#{task.priority.low}">Low</span></span>
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{priority}" value="MEDIUM" id="priority-medium"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" for="priority-medium">
                    <span class="badge bg-warning text-dark"><i class="bi bi-reception-2"></i> <span th:text="#{task.priority.medium}">Medium</span></span>
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{priority}" value="HIGH" id="priority-high"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" for="priority-high">
                    <span class="badge bg-danger"><i class="bi bi-reception-4"></i> <span th:text="#{task.priority.high}">High</span></span>
                </label>
            </div>
        </div>
    </div>

    <!-- Due Date -->
    <div class="mb-3">
        <label for="dueDate" class="form-label fw-bold" th:text="#{task.field.dueDate}">Due Date</label>
        <input type="date"
               th:field="*{dueDate}"
               class="form-control"
               id="dueDate"
               th:disabled="${mode == 'view'}">
    </div>

    <!-- Assigned To -->
    <div class="mb-3">
        <label for="userId" class="form-label fw-bold" th:text="#{task.field.user}">Assigned To</label>
        <searchable-select name="userId" id="userId"
                           src="/api/users" value-field="id" text-field="name"
                           th:placeholder="#{task.field.user.placeholder}"
                           th:disabled="${mode == 'view'}">
            <option value="" th:text="#{task.field.user.unassigned}">Unassigned</option>
            <option th:if="${task.user != null}"
                    th:value="${task.user.id}"
                    th:text="${task.user.name}"
                    selected>Selected User</option>
        </searchable-select>
    </div>

    <!-- Tags -->
    <div class="mb-3" th:if="${tags != null}">
        <label class="form-label fw-bold" th:text="#{task.field.tags}">Tags</label>
        <div class="d-flex flex-wrap gap-2">
            <div th:each="tag : ${tags}" class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox"
                       th:id="'tag-' + ${tag.id}"
                       name="tagIds"
                       th:value="${tag.id}"
                       th:checked="${task.tags != null && task.tags.contains(tag)}"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" th:for="'tag-' + ${tag.id}" th:text="${tag.name}">Tag</label>
            </div>
        </div>
    </div>

</th:block>
