<!--/* Shared form fields fragment — included by task.html (full page) and task-modal.html (HTMX modal).
     th:object must be set on the enclosing <form> in the including template.
     mode='view' disables all fields for read-only display; the layout is otherwise identical. */-->
<th:block th:fragment="fields" xmlns:th="http://www.thymeleaf.org">

    <input type="hidden" th:field="*{version}">

    <!--/* Project selector: shown in create mode when editableProjects is available (cross-project create
         or validation re-render). Pre-selects the current project if set. */-->
    <div class="mb-3" th:if="${mode == 'create' && editableProjects != null}">
        <label for="projectId" class="form-label fw-bold form-label-required"
               th:text="#{task.field.project}">Project</label>
        <select name="projectId" id="projectId" class="form-select" required>
            <option value="" th:text="#{task.field.project.placeholder}">Select a project...</option>
            <option th:each="p : ${editableProjects}"
                    th:value="${p.id}"
                    th:text="${p.name}"
                    th:selected="${task.project != null && task.project.id == p.id}">Project</option>
        </select>
    </div>
    <!--/* When project is set but no dropdown available (project-scoped create from project page),
         carry projectId in a hidden field. */-->
    <input th:if="${task.project != null && editableProjects == null}" type="hidden" name="projectId" th:value="${task.project.id}">

    <!--/* Sprint selector: shown when project has sprints enabled.
         Always rendered (for JS to populate on project change), hidden when empty. */-->
    <div class="mb-3" id="sprint-selector"
         th:classappend="${projectSprints == null || projectSprints.isEmpty()} ? 'd-none'">
        <label for="sprintId" class="form-label fw-bold" th:text="#{task.field.sprint}">Sprint</label>
        <select name="sprintId" id="sprintId" class="form-select"
                th:disabled="${mode == 'view'}">
            <option value="" th:text="#{task.field.sprint.none}">No Sprint</option>
            <option th:each="s : ${projectSprints}"
                    th:if="${!s.past || (task.sprint != null && task.sprint.id == s.id)}"
                    th:value="${s.id}"
                    th:text="${s.name}"
                    th:selected="${task.sprint != null && task.sprint.id == s.id}">Sprint</option>
        </select>
    </div>

    <!--/* Generated-from badge — shown when task was created by a recurring template */-->
    <div class="mb-3" th:if="${taskFormRequest.templateName != null}">
        <span class="badge bg-info-subtle text-info-emphasis">
            <i class="bi bi-arrow-repeat"></i>
            <span th:text="#{recurring.generatedFrom(${taskFormRequest.templateName})}">Generated from: Template</span>
        </span>
    </div>

    <!-- Title -->
    <div class="mb-3">
        <label for="title" class="form-label fw-bold"
               th:classappend="${mode != 'view'} ? 'form-label-required'"
               th:text="#{task.field.title}">Title</label>
        <input type="text"
               th:field="*{title}"
               class="form-control"
               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
               th:placeholder="#{task.field.title.placeholder}"
               th:disabled="${mode == 'view'}">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
            Title error
        </div>
    </div>

    <!-- Description -->
    <div class="mb-3">
        <label for="description" class="form-label fw-bold" th:text="#{task.field.description}">Description</label>
        <textarea th:field="*{description}"
                  class="form-control"
                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"
                  rows="4"
                  th:placeholder="#{task.field.description.placeholder}"
                  th:disabled="${mode == 'view'}"></textarea>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">
            Description error
        </div>
    </div>

    <!-- Assigned To -->
    <div class="mb-3">
        <label for="assigneeId" class="form-label fw-bold" th:text="#{task.field.user}">Assigned To</label>
        <searchable-select name="assigneeId" id="assigneeId"
                           th:src="${task.project != null ? appRoutes.apiProjectMembersAssignable.params('projectId', task.project.id).build() : appRoutes.apiUsers}"
                           value-field="id" text-field="name" prefetch
                           th:placeholder="#{task.field.user.placeholder}"
                           th:disabled="${mode == 'view'}">
            <option value="" th:text="#{task.field.user.unassigned}">Unassigned</option>
            <option th:if="${task.user != null}"
                    th:value="${task.user.id}"
                    th:text="${task.user.name}"
                    selected>Selected User</option>
        </searchable-select>
    </div>

    <!-- Status -->
    <div class="mb-3" th:if="${mode != 'create'}">
        <label class="form-label fw-bold" th:text="#{task.field.status}">Status</label>
        <div class="form-check-row gap-3 flex-wrap">
            <div class="form-check" th:each="s : ${T(cc.desuka.demo.model.TaskStatus).values()}">
                <input class="form-check-input" type="radio" th:field="*{status}"
                       th:value="${s.name()}" th:id="'status-' + ${s.name()}"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" th:for="'status-' + ${s.name()}">
                    <span class="badge" th:classappend="${s.cssClass}">
                        <i class="bi" th:classappend="${s.icon}"></i>
                        <span th:text="#{${s.messageKey}}">Status</span>
                    </span>
                </label>
            </div>
        </div>
    </div>

    <!-- Priority -->
    <div class="mb-3">
        <label class="form-label fw-bold" th:text="#{task.field.priority}">Priority</label>
        <div class="form-check-row gap-3">
            <div class="form-check" th:each="p : ${T(cc.desuka.demo.model.Priority).values()}">
                <input class="form-check-input" type="radio" th:field="*{priority}"
                       th:value="${p.name()}" th:id="'priority-' + ${p.name()}"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" th:for="'priority-' + ${p.name()}">
                    <span class="badge" th:classappend="${p.cssClass}">
                        <i class="bi" th:classappend="${p.icon}"></i>
                        <span th:text="#{${p.messageKey}}">Priority</span>
                    </span>
                </label>
            </div>
        </div>
    </div>

    <!-- Dates + Effort -->
    <div class="row mb-3">
        <div class="col-md-4 col-xl-5">
            <label for="startDate" class="form-label fw-bold" th:text="#{task.field.startDate}">Start Date</label>
            <input type="date"
                   th:field="*{startDate}"
                   class="form-control date-range-start"
                   id="startDate"
                   data-date-min-for="dueDate"
                   th:disabled="${mode == 'view'}">
        </div>
        <div class="col-md-4 col-xl-5">
            <label for="dueDate" class="form-label fw-bold" th:text="#{task.field.dueDate}">Due Date</label>
            <input type="date"
                   th:field="*{dueDate}"
                   class="form-control"
                   id="dueDate"
                   th:disabled="${mode == 'view'}">
        </div>
        <div class="col-md-4 col-xl-2">
            <label for="effort" class="form-label fw-bold" th:text="#{task.field.effort}">Effort</label>
            <input type="number"
                   th:field="*{effort}"
                   class="form-control"
                   id="effort"
                   min="0"
                   max="32767"
                   th:placeholder="#{task.field.effort.placeholder}"
                   th:disabled="${mode == 'view'}">
        </div>
    </div>

    <!-- Read-only dates: Completed and Last Updated -->
    <div class="row mb-3" th:if="${mode != 'create'}">
        <div class="col-md-6" th:if="${task.completedAt != null}">
            <label class="form-label fw-bold text-muted" th:text="#{task.field.completedAt}">Completed</label>
            <div class="form-control-plaintext small text-muted"
                 th:text="${#temporals.format(task.completedAt, 'MMM dd, yyyy h:mm a')}">Date</div>
        </div>
        <div class="col-md-6" th:if="${task.updatedAt != null}">
            <label class="form-label fw-bold text-muted" th:text="#{task.field.updatedAt}">Last Updated</label>
            <div class="form-control-plaintext small text-muted"
                 th:text="${#temporals.format(task.updatedAt, 'MMM dd, yyyy h:mm a')}">Date</div>
        </div>
    </div>

    <!-- Tags -->
    <div class="mb-3" th:if="${tags != null}">
        <label class="form-label fw-bold" th:text="#{task.field.tags}">Tags</label>
        <div class="d-flex flex-wrap gap-2">
            <div th:each="tag : ${tags}" class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox"
                       th:id="'tag-' + ${tag.id}"
                       name="tagIds"
                       th:value="${tag.id}"
                       th:checked="${task.tags != null && task.tags.contains(tag)}"
                       th:disabled="${mode == 'view'}">
                <label class="form-check-label" th:for="'tag-' + ${tag.id}" th:text="${tag.name}">Tag</label>
            </div>
        </div>
    </div>

</th:block>

<!--/* Checklist fragment — included separately by modal (right panel) and full page (within form).
     Must be inside a <form> with th:object="${task}" for submission. */-->
<th:block th:fragment="checklist" xmlns:th="http://www.thymeleaf.org">
    <div id="checklist-container">
        <div th:each="item, stat : ${task.checklistItems}" class="checklist-item d-flex align-items-center gap-1 mb-1"
             draggable="true"
             data-action="dragstart->tasks--form#checklistDragStart dragover->tasks--form#checklistDragOver dragend->tasks--form#checklistDragEnd drop->tasks--form#checklistDrop">
            <div class="input-group input-group-sm">
                <span th:if="${mode != 'view'}" class="input-group-text checklist-drag-handle">
                    <i class="bi bi-grip-vertical"></i>
                </span>
                <div class="input-group-text">
                    <!--/* Hidden field ensures unchecked checkboxes still submit "false" */-->
                    <input type="hidden" name="checklistChecked" th:value="${item.checked}">
                    <input type="checkbox" class="form-check-input mt-0"
                           th:checked="${item.checked}"
                           th:disabled="${mode == 'view'}"
                           data-action="change->tasks--form#syncChecklistCheckbox">
                </div>
                <input type="text" class="form-control"
                       name="checklistTexts"
                       autocomplete="off"
                       th:value="${item.text}"
                       th:placeholder="#{task.checklist.placeholder}"
                       th:disabled="${mode == 'view'}">
            </div>
            <button th:if="${mode != 'view'}" type="button" class="btn btn-sm btn-outline-danger border-0"
                    data-action="click->tasks--form#removeChecklistItem">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
    <p id="checklist-empty" class="text-muted small mb-0"
       th:classappend="${task.checklistItems != null && !task.checklistItems.isEmpty() ? 'd-none' : ''}"
       th:text="#{task.checklist.empty}">No checklist items</p>
    <!--/* Template for JS-added checklist items — single source of truth for item markup */-->
    <template id="checklist-item-template" th:if="${mode != 'view'}">
        <div class="checklist-item d-flex align-items-center gap-1 mb-1"
             draggable="true"
             data-action="dragstart->tasks--form#checklistDragStart dragover->tasks--form#checklistDragOver dragend->tasks--form#checklistDragEnd drop->tasks--form#checklistDrop">
            <div class="input-group input-group-sm">
                <span class="input-group-text checklist-drag-handle">
                    <i class="bi bi-grip-vertical"></i>
                </span>
                <div class="input-group-text">
                    <input type="hidden" name="checklistChecked" value="false">
                    <input type="checkbox" class="form-check-input mt-0"
                           data-action="change->tasks--form#syncChecklistCheckbox">
                </div>
                <input type="text" class="form-control" name="checklistTexts" autocomplete="off"
                       th:placeholder="#{task.checklist.placeholder}">
            </div>
            <button type="button" class="btn btn-sm btn-outline-danger border-0"
                    data-action="click->tasks--form#removeChecklistItem">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </template>
</th:block>
