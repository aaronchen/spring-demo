<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(${mode == 'view'} ? #{page.title.task.detail} : (${mode == 'edit'} ? #{page.title.task.edit} : #{page.title.task.create}), '/css/tasks.css')}"></head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <div th:replace="~{layouts/base :: navbar}"></div>

    <!-- Main Content -->
    <main class="container-fluid flex-grow-1 d-flex flex-column px-5 pb-3"
          data-controller="tasks--form tasks--dependencies">
        <div th:with="canEdit=${#auth.canEdit(task) || task.user == null}">
            <!-- Stale data banner -->
            <div th:if="${mode != 'create'}" id="stale-banner"
                 class="alert alert-info d-none mb-2 d-flex align-items-center" role="alert">
                <div>
                    <i class="bi bi-arrow-repeat me-1"></i>
                    <span th:text="#{task.stale.detail}">This task was modified by another user.</span>
                </div>
                <a href="#" id="stale-banner-refresh" class="alert-link ms-auto"
                   th:text="#{task.stale.refresh}">Refresh</a>
            </div>

            <!-- Page Header -->
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div>
                    <h1 class="display-4 mb-0"
                        th:text="${mode == 'view'} ? #{task.view.heading} : (${mode == 'edit'} ? #{task.edit.heading} : #{task.create.heading})">
                        Task Form
                    </h1>
                    <small th:if="${task.project != null && (mode != 'create' || editableProjects == null)}" class="text-muted">
                        <i class="bi bi-folder"></i>
                        <a th:href="@{/projects/{id}(id=${task.project.id})}"
                           class="text-muted text-decoration-none project-link"
                           th:text="${task.project.name}">Project</a>
                    </small>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="${mode == 'edit'} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}"
                       class="btn btn-outline-secondary btn-lg px-4">
                        <i class="bi bi-x-circle"></i> <span th:text="#{action.cancel}">Cancel</span>
                    </a>
                    <!--/* View mode: show Edit Task button if user can edit */-->
                    <a th:if="${mode == 'view' && canEdit}"
                       th:href="@{/tasks/{id}/edit(id=${task.id})}"
                       class="btn btn-primary btn-lg px-4">
                        <i class="bi bi-pencil"></i>
                        <span th:text="#{action.editTask}">Edit Task</span>
                    </a>
                    <!--/* Edit/create mode: submit button */-->
                    <button th:if="${mode != 'view'}" type="submit" form="task-page-form" class="btn btn-primary btn-lg px-4">
                        <i th:class="${mode == 'edit'} ? 'bi bi-save' : 'bi bi-plus-circle'"></i>
                        <span th:text="${mode == 'edit'} ? #{action.updateTask} : #{action.createTask}">Submit</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Two-Column Layout -->
        <form id="task-page-form" class="task-page-form border rounded-0 flex-grow-1 min-h-0"
              th:action="${mode == 'edit'} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}"
              th:object="${taskFormRequest}"
              method="post">
            <th:block th:replace="~{tasks/task-layout :: columns}"></th:block>
        </form>
    </main>

    <!-- Footer -->
    <div th:replace="~{layouts/base :: footer}"></div>

    <!-- Scripts -->
    <div th:replace="~{layouts/base :: scripts}"></div>

    <script th:if="${mode != 'create'}" th:inline="javascript">
        (function() {
            const taskId = /*[[${task.id}]]*/ '';
            const projectId = /*[[${task.project.id}]]*/ '';
            const currentUserId = document.querySelector('meta[name="_userId"]')?.content;
            const staleBanner = document.getElementById('stale-banner');
            const staleRefresh = document.getElementById('stale-banner-refresh');

            if (!window.stompClient || !staleBanner) return;

            window.stompClient.onConnect(function(client) {
                client.subscribe(APP_CONFIG.routes.topicProjectTasks.resolve({ projectId }), function(message) {
                    const data = JSON.parse(message.body);
                    if (currentUserId && String(data.userId) === currentUserId) return;
                    if (data.taskId !== taskId) return;
                    staleBanner.classList.remove('d-none');
                });

                // Live comment updates — refresh activity timeline
                client.subscribe(APP_CONFIG.routes.topicTaskComments.resolve({ taskId }), function(message) {
                    const data = JSON.parse(message.body);
                    if (currentUserId && String(data.userId) === currentUserId) return;
                    htmx.ajax('GET', `${APP_CONFIG.routes.tasks}/${taskId}/activity`,
                        {target: '#task-activity', swap: 'outerHTML'});
                });
            });

            staleRefresh.addEventListener('click', function(e) {
                e.preventDefault();
                location.reload();
            });
        })();
    </script>
</body>
</html>
