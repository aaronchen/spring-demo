<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(${mode == 'view'} ? #{page.title.task.detail} : (${mode == 'edit'} ? #{page.title.task.edit} : #{page.title.task.create}), '/css/tasks.css')}"></head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <div th:replace="~{layouts/base :: navbar}"></div>

    <!-- Main Content -->
    <main class="container flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10"
                 th:with="canEdit=${#auth.canEdit(task) || task.user == null}">
                <!-- Page Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="display-5"
                        th:text="${mode == 'view'} ? #{task.view.heading} : (${mode == 'edit'} ? #{task.edit.heading} : #{task.create.heading})">
                        Task Form
                    </h1>
                    <a th:href="@{/tasks}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> <span th:text="#{action.backToList}">Back to List</span>
                    </a>
                </div>

                <!-- Form Card -->
                <div class="card shadow">
                    <div class="card-body p-4">
                        <form th:action="${mode == 'edit'} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}"
                              th:object="${task}"
                              method="post">

                            <th:block th:replace="~{tasks/task-form :: fields}"></th:block>

                            <!-- Action Buttons -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a th:href="@{/tasks}" class="btn btn-outline-secondary btn-lg px-4">
                                    <i class="bi bi-x-circle"></i> <span th:text="#{action.cancel}">Cancel</span>
                                </a>
                                <!--/* View mode: show Edit Task button if user can edit */-->
                                <a th:if="${mode == 'view' && canEdit}"
                                   th:href="@{/tasks/{id}/edit(id=${task.id})}"
                                   class="btn btn-primary btn-lg px-4">
                                    <i class="bi bi-pencil"></i>
                                    <span th:text="#{action.editTask}">Edit Task</span>
                                </a>
                                <!--/* Edit/create mode: submit button */-->
                                <button th:if="${mode != 'view'}" type="submit" class="btn btn-primary btn-lg px-4">
                                    <i th:class="${mode == 'edit'} ? 'bi bi-save' : 'bi bi-plus-circle'"></i>
                                    <span th:text="${mode == 'edit'} ? #{action.updateTask} : #{action.createTask}">Submit</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Help Text -->
                <div th:if="${mode != 'view'}" class="alert alert-light mt-4" role="alert">
                    <h6 class="alert-heading">
                        <i class="bi bi-info-circle"></i> <span th:text="#{task.form.tips.heading}">Tips:</span>
                    </h6>
                    <ul class="mb-0">
                        <li th:text="#{task.form.tips.title}">Use clear, actionable titles for better task organization</li>
                        <li th:text="#{task.form.tips.description}">Add descriptions to provide context and track progress</li>
                        <li th:if="${mode == 'edit'}" th:text="#{task.form.tips.completion}">Toggle completion status to mark tasks as done</li>
                    </ul>
                </div>

                <!-- Comments -->
                <div th:if="${mode != 'create'}" class="card shadow mt-4">
                    <div class="card-header bg-light">
                        <h6 class="mb-0">
                            <i class="bi bi-chat-dots"></i>
                            <span id="task-comments-heading"
                                  th:text="#{comment.heading(${comments.size()})}">Comments (0)</span>
                        </h6>
                    </div>
                    <div class="card-body">
                        <th:block th:replace="~{tasks/task-comments :: list}"></th:block>
                        <!-- Add Comment Form -->
                        <form class="mt-3"
                              th:attr="hx-post=${appRoutes.tasks + '/' + task.id + '/comments'}"
                              hx-target="#task-comments"
                              hx-swap="outerHTML"
                              hx-on::after-request="if(event.detail.successful) this.reset()">
                            <div class="input-group">
                                <input type="text" name="text" class="form-control"
                                       th:placeholder="#{comment.field.text.placeholder}" required maxlength="500">
                                <button type="submit" class="btn btn-outline-primary">
                                    <i class="bi bi-send"></i> <span th:text="#{comment.action.post}">Post</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Audit History -->
                <div th:if="${mode != 'create' && !auditHistory.isEmpty()}" class="card card-clip shadow mt-4 mb-4">
                    <div class="card-header bg-light">
                        <h6 class="mb-0">
                            <i class="bi bi-clock-history"></i> <span th:text="#{audit.history.heading}">History</span>
                        </h6>
                    </div>
                    <div class="card-body p-0">
                        <th:block th:replace="~{tasks/task-audit :: entries}"></th:block>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div th:replace="~{layouts/base :: footer}"></div>

    <!-- Scripts -->
    <div th:replace="~{layouts/base :: scripts}"></div>
</body>
</html>
