<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(${isEdit} ? #{page.title.task.edit} : #{page.title.task.create}, '/css/tasks.css')}"></head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <div th:replace="~{layouts/base :: navbar}"></div>

    <!-- Main Content -->
    <main class="container flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <!-- Page Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="display-5" th:text="${isEdit} ? #{task.edit.heading} : #{task.create.heading}">Task Form</h1>
                    <a th:href="@{/tasks}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> <span th:text="#{action.backToList}">Back to List</span>
                    </a>
                </div>

                <!-- Form Card -->
                <div class="card shadow">
                    <div class="card-body p-4">
                        <form th:action="${isEdit} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}"
                              th:object="${task}"
                              method="post">

                            <th:block th:replace="~{tasks/task-form :: fields}"></th:block>

                            <!-- Action Buttons -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a th:href="@{/tasks}" class="btn btn-outline-secondary btn-lg px-4">
                                    <i class="bi bi-x-circle"></i> <span th:text="#{action.cancel}">Cancel</span>
                                </a>
                                <button type="submit" class="btn btn-primary btn-lg px-4">
                                    <i th:class="${isEdit} ? 'bi bi-save' : 'bi bi-plus-circle'"></i>
                                    <span th:text="${isEdit} ? #{action.updateTask} : #{action.createTask}">Submit</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Help Text -->
                <div class="alert alert-light mt-4" role="alert">
                    <h6 class="alert-heading">
                        <i class="bi bi-info-circle"></i> <span th:text="#{task.form.tips.heading}">Tips:</span>
                    </h6>
                    <ul class="mb-0">
                        <li th:text="#{task.form.tips.title}">Use clear, actionable titles for better task organization</li>
                        <li th:text="#{task.form.tips.description}">Add descriptions to provide context and track progress</li>
                        <li th:if="${isEdit}" th:text="#{task.form.tips.completion}">Toggle completion status to mark tasks as done</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div th:replace="~{layouts/base :: footer}"></div>

    <!-- Scripts -->
    <div th:replace="~{layouts/base :: scripts}"></div>
</body>
</html>
