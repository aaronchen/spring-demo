<!--/* Calendar view fragment — monthly grid with task chips.
     Each task appears once: on its due date, or start date if no due date.
     Reads ${calendarWeeks} (List<List<CalendarDay>>), ${calendarMonth} (YearMonth),
     and ${undatedCount} (long) from the model. */-->
<div th:fragment="grid" xmlns:th="http://www.thymeleaf.org">

    <!-- Month Navigation -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-outline-secondary btn-sm"
                th:data-month="${calendarMonth.minusMonths(1)}"
                onclick="navigateMonth(this.dataset.month)">
            <i class="bi bi-chevron-left"></i>
        </button>
        <h4 class="mb-0" th:text="${#temporals.format(calendarMonth.atDay(1), 'MMMM yyyy')}">March 2026</h4>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm"
                    th:data-month="${calendarMonth.plusMonths(1)}"
                    onclick="navigateMonth(this.dataset.month)">
                <i class="bi bi-chevron-right"></i>
            </button>
            <button class="btn btn-outline-primary btn-sm"
                    onclick="navigateMonth(null)"
                    th:text="#{task.calendar.today}">Today</button>
        </div>
    </div>

    <!--/* Tasks with no start date or due date are excluded from the calendar grid */-->
    <div th:if="${undatedCount != null && undatedCount > 0}" class="alert alert-light border py-2 px-3 mb-3 small">
        <i class="bi bi-info-circle me-1"></i>
        <span th:text="#{task.calendar.undated(${undatedCount})}">N tasks without dates are not shown.</span>
    </div>

    <!-- Calendar Grid -->
    <div class="table-responsive">
        <table class="table table-bordered calendar-grid mb-0">
            <thead>
                <tr class="text-center">
                    <th th:text="#{task.calendar.day.mon}">Mon</th>
                    <th th:text="#{task.calendar.day.tue}">Tue</th>
                    <th th:text="#{task.calendar.day.wed}">Wed</th>
                    <th th:text="#{task.calendar.day.thu}">Thu</th>
                    <th th:text="#{task.calendar.day.fri}">Fri</th>
                    <th th:text="#{task.calendar.day.sat}">Sat</th>
                    <th th:text="#{task.calendar.day.sun}">Sun</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="week : ${calendarWeeks}">
                    <td th:each="day : ${week}"
                        class="calendar-cell"
                        th:classappend="${!day.currentMonth() ? 'calendar-other-month' : ''} + ${day.today() ? ' calendar-today' : ''}">

                        <!-- Date number + add button -->
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <span class="calendar-day-number"
                                  th:classappend="${day.today() ? 'fw-bold text-primary' : ''}"
                                  th:text="${day.date().dayOfMonth}">1</span>
                            <a href="#" class="calendar-add-btn text-muted"
                               th:attr="hx-get=${appRoutes.tasks + '/new?dueDate=' + #temporals.format(day.date(), 'yyyy-MM-dd')}"
                               hx-target="#task-modal-content"
                               hx-swap="innerHTML"
                               th:title="#{task.calendar.addTask}">
                                <i class="bi bi-plus"></i>
                            </a>
                        </div>

                        <!-- Task chips — scrollable within cell -->
                        <div class="calendar-chips">
                            <th:block th:each="task : ${day.tasks()}">
                                <div th:with="isCompleted=${task.status.name() == 'COMPLETED'},
                                             isInProgress=${task.status.name() == 'IN_PROGRESS'},
                                             isOverdue=${!isCompleted && task.dueDate != null && task.dueDate.isBefore(T(java.time.LocalDate).now())},
                                             canEdit=${#auth.canEdit(task) || task.user == null},
                                             onDueDate=${task.dueDate != null}"
                                     class="calendar-chip"
                                     th:classappend="${isOverdue ? 'calendar-chip-overdue' : (isCompleted ? 'calendar-chip-completed' : (isInProgress ? 'calendar-chip-in-progress' : 'calendar-chip-open'))} + ${onDueDate ? ' calendar-chip-end' : ' calendar-chip-start'}">
                                    <a href="#"
                                       th:attr="hx-get=${canEdit ? appRoutes.tasks + '/' + task.id + '/edit' : appRoutes.tasks + '/' + task.id}"
                                       hx-target="#task-modal-content"
                                       hx-swap="innerHTML"
                                       class="calendar-chip-link text-decoration-none"
                                       th:title="${task.title}">
                                        <span th:if="${task.user != null}"
                                              class="calendar-chip-user"
                                              th:text="${task.user.name.substring(0,1)}"
                                              th:title="${task.user.name}"
                                              th:data-user-id="${task.user.id}"
                                              th:data-user-name="${task.user.name}"
                                              onclick="event.preventDefault(); event.stopPropagation(); setUserFilter(this.dataset.userId, this.dataset.userName);">A</span>
                                        <span class="calendar-chip-title" th:text="${task.title}">Task Title</span>
                                    </a>
                                </div>
                            </th:block>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
