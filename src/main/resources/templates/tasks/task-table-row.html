<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Row fragment: a single <tr> for use in task-table.html tbody and HTMX toggle swap -->
<table>
<tbody>
<tr th:fragment="row"
    th:id="'task-row-' + ${task.id}"
    th:classappend="${task.completed ? 'table-success' : ''}"
    th:with="isOwner=${#auth.canEdit(task)}">
    <td>
        <a th:href="${isOwner} ? @{/tasks/{id}/edit(id=${task.id})} : @{/tasks/{id}(id=${task.id})}"
           th:attr="hx-get=${isOwner ? appRoutes.tasks + '/' + task.id + '/edit' : appRoutes.tasks + '/' + task.id}"
           hx-target="#task-modal-content"
           hx-swap="innerHTML"
           class="fw-semibold text-decoration-none"
           th:text="${task.title}">Title</a>
        <span th:each="tag : ${task.tags}" class="badge bg-secondary ms-1">
            <i class="bi bi-tag"></i> <span th:text="${tag.name}">Tag</span>
        </span>
        <br th:if="${task.user != null}">
        <small class="text-muted" th:if="${task.user != null}">
            <i class="bi bi-person"></i> <span th:text="${task.user.name}">User</span>
        </small>
    </td>
    <td style="white-space: nowrap;">
        <span th:if="${task.completed}" class="badge bg-success">
            <i class="bi bi-check-circle-fill"></i> <span th:text="#{task.status.completed}">Completed</span>
        </span>
        <span th:if="${!task.completed}" class="badge bg-warning text-dark">
            <i class="bi bi-circle"></i> <span th:text="#{task.status.pending}">Pending</span>
        </span>
    </td>
    <td style="white-space: nowrap;">
        <small class="text-muted" th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy')}">Date</small>
    </td>
    <td class="text-truncate" style="max-width: 280px;">
        <span class="text-muted small" th:text="${task.description} ?: #{task.noDescription}">Description</span>
    </td>
    <td>
        <div class="btn-group btn-group-sm">
            <!-- Toggle Button -->
            <button th:class="${task.completed ? 'btn btn-outline-warning' : 'btn btn-outline-success'}"
                    th:attr="hx-post=${appRoutes.tasks + '/' + task.id + '/toggle?view=table'},hx-target='#task-row-' + ${task.id}"
                    hx-swap="outerHTML"
                    th:title="${task.completed} ? #{action.toggle.markPending} : #{action.toggle.markComplete}">
                <i th:class="${task.completed ? 'bi bi-arrow-counterclockwise' : 'bi bi-check2'}"></i>
            </button>
            <!-- View/Edit Button — owners open in edit mode, non-owners in view mode -->
            <a th:href="${isOwner} ? @{/tasks/{id}/edit(id=${task.id})} : @{/tasks/{id}(id=${task.id})}"
               th:attr="hx-get=${isOwner ? appRoutes.tasks + '/' + task.id + '/edit' : appRoutes.tasks + '/' + task.id}"
               hx-target="#task-modal-content"
               hx-swap="innerHTML"
               class="btn btn-outline-primary"
               th:title="${isOwner} ? #{action.editTask} : #{action.viewTask}">
                <i th:class="${isOwner} ? 'bi bi-pencil' : 'bi bi-eye'"></i>
            </a>
            <!-- Delete Button — owners only -->
            <button th:if="${isOwner}" class="btn btn-outline-danger"
                    data-bs-toggle="modal"
                    data-bs-target="#task-delete-modal"
                    th:data-task-id="${task.id}"
                    th:data-task-title="${task.title}"
                    title="Delete">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </td>
</tr>
</tbody>
</table>

</body>
</html>
