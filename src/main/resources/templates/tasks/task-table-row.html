<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--/* Row fragment: a single <tr> for use in task-table.html tbody and HTMX toggle swap */-->
<table>
<tbody>
<tr th:fragment="row"
    th:id="'task-row-' + ${task.id}"
    th:classappend="${task.status.name() == 'COMPLETED' ? 'table-success' : (task.status.name() == 'CANCELLED' ? 'table-secondary' : '')}"
    th:data-blocked="${task.blocked ? 'true' : null}"
    th:with="canEdit=${canEditProject != null ? canEditProject : (projectEditMap != null ? projectEditMap[task.project.id] : (#auth.canEdit(task) || task.user == null))},
             isBacklog=${task.status.name() == 'BACKLOG'},
             isOpen=${task.status.name() == 'OPEN'},
             isInProgress=${task.status.name() == 'IN_PROGRESS'},
             isInReview=${task.status.name() == 'IN_REVIEW'},
             isCompleted=${task.status.name() == 'COMPLETED'},
             isCancelled=${task.status.name() == 'CANCELLED'},
             isTerminal=${isCompleted || isCancelled},
             overdue=${!isTerminal && task.dueDate != null && task.dueDate.isBefore(T(java.time.LocalDate).now())}">
    <td class="bulk-select-cell">
        <input type="checkbox" class="form-check-input bulk-select-checkbox"
               th:data-task-id="${task.id}"
               th:data-project-id="${task.project.id}"
               data-action="change->tasks--bulk-actions#onSelectChange">
    </td>
    <td th:data-editable="${canEdit ? 'true' : null}" data-field="title"
        th:data-task-id="${task.id}" th:data-value="${task.title}">
        <div class="d-flex align-items-center flex-wrap gap-1">
            <span th:if="${task.blocked}" class="badge bg-warning text-dark"
                  th:title="#{task.dependency.blocked.tooltip}">
                <i class="bi bi-lock-fill"></i>
            </span>
            <span th:if="${task.checklistTotal > 0}" class="badge bg-light text-dark">
                <i class="bi bi-check2-square"></i>
                <span th:text="#{task.checklist.progress(${task.checklistChecked}, ${task.checklistTotal})}">0/0</span>
            </span>
            <a th:href="${canEdit} ? @{/tasks/{id}/edit(id=${task.id})} : @{/tasks/{id}(id=${task.id})}"
               th:attr="hx-get=${canEdit ? appRoutes.tasks + '/' + task.id + '/edit' : appRoutes.tasks + '/' + task.id}"
               hx-target="#task-modal-content"
               hx-swap="innerHTML"
               class="fw-semibold text-decoration-none"
               th:text="${task.title}">Title</a>
            <a th:each="tag : ${task.tags}" href="#"
               class="badge bg-secondary text-decoration-none text-white"
               th:data-tag-id="${tag.id}"
               data-action="click->tasks--list#toggleTagFilter:prevent">
                <i class="bi bi-tag"></i> <span th:text="${tag.name}">Tag</span>
            </a>
        </div>
        <small th:if="${project == null}">
            <i class="bi bi-folder text-muted"></i>
            <a th:href="@{/projects/{id}(id=${task.project.id})}"
               class="text-muted text-decoration-none project-link"
               th:text="${task.project.name}">Project</a>
        </small>
        <small th:if="${task.user != null}">
            <i class="bi bi-person text-muted"></i>
            <a href="#" class="text-muted text-decoration-none user-link"
               th:data-user-id="${task.user.id}"
               th:data-user-name="${task.user.name}"
               data-action="click->tasks--list#setUserFilter:prevent"
               th:text="${task.user.name}">User</a>
        </small>
    </td>
    <td style="white-space: nowrap;" th:data-editable="${canEdit ? 'true' : null}"
        data-field="priority" th:data-task-id="${task.id}" th:data-value="${task.priority.name()}">
        <a href="#" th:if="${task.priority.name() == 'HIGH'}" class="badge bg-danger text-decoration-none text-white"
           data-action="click->tasks--list#setPriorityFilter:prevent" data-priority="HIGH">
            <i class="bi bi-reception-4"></i> <span th:text="#{task.priority.high}">High</span>
        </a>
        <a href="#" th:if="${task.priority.name() == 'MEDIUM'}" class="badge bg-warning text-dark text-decoration-none"
           data-action="click->tasks--list#setPriorityFilter:prevent" data-priority="MEDIUM">
            <i class="bi bi-reception-2"></i> <span th:text="#{task.priority.medium}">Medium</span>
        </a>
        <a href="#" th:if="${task.priority.name() == 'LOW'}" class="badge bg-success text-decoration-none text-white"
           data-action="click->tasks--list#setPriorityFilter:prevent" data-priority="LOW">
            <i class="bi bi-reception-1"></i> <span th:text="#{task.priority.low}">Low</span>
        </a>
    </td>
    <td style="white-space: nowrap;" th:data-editable="${canEdit ? 'true' : null}"
        data-field="status" th:data-task-id="${task.id}" th:data-value="${task.status.name()}">
        <a href="#" th:if="${isCompleted}" class="badge bg-success text-decoration-none text-white"
           data-action="click->tasks--list#setStatusFilter:prevent" data-status="COMPLETED">
            <i class="bi bi-check-circle-fill"></i> <span th:text="#{task.status.completed}">Completed</span>
        </a>
        <a href="#" th:if="${isCancelled}" class="badge bg-dark text-decoration-none text-white"
           data-action="click->tasks--list#setStatusFilter:prevent" data-status="CANCELLED">
            <i class="bi bi-x-circle-fill"></i> <span th:text="#{task.status.cancelled}">Cancelled</span>
        </a>
        <a href="#" th:if="${overdue}" class="badge bg-danger text-decoration-none text-white"
           data-action="click->tasks--list#setStatusFilter:prevent" data-status="OVERDUE">
            <i class="bi bi-exclamation-circle-fill"></i> <span th:text="#{task.dueDate.overdue}">Overdue</span>
        </a>
        <a href="#" th:if="${isInReview && !overdue}" class="badge bg-info text-decoration-none text-white"
           data-action="click->tasks--list#setStatusFilter:prevent" data-status="IN_REVIEW">
            <i class="bi bi-eye-fill"></i> <span th:text="#{task.status.inReview}">In Review</span>
        </a>
        <a href="#" th:if="${isInProgress && !overdue}" class="badge bg-warning text-dark text-decoration-none"
           data-action="click->tasks--list#setStatusFilter:prevent" data-status="IN_PROGRESS">
            <i class="bi bi-play-circle-fill"></i> <span th:text="#{task.status.inProgress}">In Progress</span>
        </a>
        <a href="#" th:if="${isBacklog && !overdue}" class="badge bg-backlog text-decoration-none"
           data-action="click->tasks--list#setStatusFilter:prevent" data-status="BACKLOG">
            <i class="bi bi-inbox"></i> <span th:text="#{task.status.backlog}">Backlog</span>
        </a>
        <a href="#" th:if="${isOpen && !overdue}" class="badge bg-secondary text-decoration-none text-white"
           data-action="click->tasks--list#setStatusFilter:prevent" data-status="OPEN">
            <i class="bi bi-circle"></i> <span th:text="#{task.status.open}">Open</span>
        </a>
    </td>
    <td style="white-space: nowrap;" th:data-editable="${canEdit ? 'true' : null}"
        data-field="dueDate" th:data-task-id="${task.id}"
        th:data-value="${task.dueDate != null ? #temporals.format(task.dueDate, 'yyyy-MM-dd') : ''}">
        <th:block th:if="${task.dueDate != null}">
            <small th:classappend="${overdue} ? 'text-danger fw-semibold' : 'text-muted'"
                   th:text="${#temporals.format(task.dueDate, 'MMM dd, yyyy')}">Date</small>
        </th:block>
    </td>
    <td style="white-space: nowrap;" th:data-editable="${canEdit ? 'true' : null}"
        data-field="effort" th:data-task-id="${task.id}"
        th:data-value="${task.effort}">
        <span th:if="${task.effort != null}" class="text-muted small" th:text="${task.effort}">0</span>
    </td>
    <td class="text-truncate" style="max-width: 280px;"
        th:data-editable="${canEdit ? 'true' : null}" data-field="description"
        th:data-task-id="${task.id}" th:data-value="${task.description}">
        <span class="text-muted small" th:text="${task.description} ?: #{task.noDescription}">Description</span>
    </td>
    <td style="white-space: nowrap;">
        <small class="text-muted" th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy')}">Date</small>
    </td>
    <td>
        <div class="btn-group btn-group-sm">
            <!-- Toggle Button -->
            <button th:class="${isInReview ? 'btn btn-outline-success' : (isInProgress ? 'btn btn-outline-info' : (isOpen ? 'btn btn-outline-warning' : 'btn btn-outline-secondary'))}"
                    th:attr="hx-post=${appRoutes.tasks + '/' + task.id + '/toggle?view=table'},hx-target='#task-row-' + ${task.id}"
                    hx-swap="outerHTML"
                    th:title="${isBacklog} ? #{action.toggle.backlog.next} : (${isOpen} ? #{action.toggle.open.next} : (${isInProgress} ? #{action.toggle.inProgress.next} : (${isInReview} ? #{action.toggle.inReview.next} : (${isCancelled} ? #{action.toggle.cancelled.next} : #{action.toggle.completed.next}))))">
                <i th:classappend="${isCompleted || isCancelled ? 'bi-arrow-counterclockwise' : (isInReview ? 'bi-check2' : (isInProgress ? 'bi-eye' : (isBacklog ? 'bi-arrow-right' : 'bi-play-fill')))}"></i>
            </button>
            <!-- View/Edit Button -->
            <a th:href="${canEdit} ? @{/tasks/{id}/edit(id=${task.id})} : @{/tasks/{id}(id=${task.id})}"
               th:attr="hx-get=${canEdit ? appRoutes.tasks + '/' + task.id + '/edit' : appRoutes.tasks + '/' + task.id}"
               hx-target="#task-modal-content"
               hx-swap="innerHTML"
               class="btn btn-outline-primary"
               th:title="${canEdit} ? #{action.editTask} : #{action.viewTask}">
                <i th:class="${canEdit} ? 'bi bi-pencil' : 'bi bi-eye'"></i>
            </a>
            <!-- Delete Button -->
            <button th:if="${canEdit && !isTerminal}" class="btn btn-outline-danger"
                    data-bs-toggle="modal"
                    data-bs-target="#task-delete-modal"
                    th:data-task-id="${task.id}"
                    th:data-task-title="${task.title}"
                    title="Delete">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </td>
</tr>
</tbody>
</table>

</body>
</html>
