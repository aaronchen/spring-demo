<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.tasks}, '/css/tasks.css')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{layouts/base :: navbar}"></div>

    <main class="container flex-grow-1 pb-4">
        <div class="row">
            <div class="col-12">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="display-4" th:text="#{task.list.heading}">Tasks</h1>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary btn-lg"
                                onclick="toggleKeyboardHelp()"
                                th:title="#{keyboard.help.title}">
                            <i class="bi bi-keyboard"></i>
                        </button>
                        <button id="export-btn" class="btn btn-outline-secondary btn-lg"
                                onclick="exportTasks()"
                                th:title="#{task.export.tooltip}">
                            <i class="bi bi-filetype-csv"></i> <span th:text="#{task.export}">Export</span>
                        </button>
                        <a th:if="${editableProjects != null && !editableProjects.isEmpty()}"
                           th:href="@{/tasks/new}"
                           class="btn btn-primary btn-lg"
                           hx-get="/tasks/new"
                           hx-target="#task-modal-content"
                           hx-swap="innerHTML">
                            <i class="bi bi-plus-circle"></i> <span th:text="#{action.newTask}">New Task</span>
                        </a>
                    </div>
                </div>

                <div th:replace="~{tasks/task-workspace}"></div>
            </div>
        </div>
    </main>

    <div th:replace="~{layouts/base :: footer}"></div>
    <div th:replace="~{layouts/base :: scripts}"></div>

    <meta name="_wsProjectIds" th:content="${#strings.listJoin(wsProjectIds, ',')}">
    <div th:replace="~{tasks/keyboard-help-modal}"></div>
    <script th:src="@{/js/tasks/task-form.js}"></script>
    <script th:src="@{/js/tasks/task-dependencies.js}"></script>
    <script th:src="@{/js/tasks/tasks.js}"></script>
    <script th:src="@{/js/tasks/kanban.js}"></script>
    <script th:src="@{/js/tasks/inline-edit.js}"></script>
    <script th:src="@{/js/tasks/bulk-actions.js}"></script>
    <script th:src="@{/js/tasks/keyboard-shortcuts.js}"></script>
</body>
</html>
