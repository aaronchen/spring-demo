<!-- Reusable task card fragment - used by both full page and HTMX partial responses -->
<div th:fragment="card" class="col" th:id="'task-card-' + ${task.id}"
     th:with="canEdit=${#auth.canEdit(task) || task.user == null},
              isOpen=${task.status.name() == 'OPEN'},
              isInProgress=${task.status.name() == 'IN_PROGRESS'},
              isCompleted=${task.status.name() == 'COMPLETED'},
              overdue=${!isCompleted && task.dueDate != null && task.dueDate.isBefore(T(java.time.LocalDate).now())}">
    <div class="card card-clip card-lift h-100 shadow-sm"
         th:classappend="${isCompleted ? 'border-success' : (isInProgress ? 'border-warning' : '')}">
        <!-- Card Header -->
        <div class="card-header d-flex justify-content-between align-items-center"
             th:classappend="${isCompleted ? 'bg-success text-white' : (isInProgress ? 'bg-warning text-dark' : '')}">
            <h5 class="mb-0">
                <a th:href="${canEdit} ? @{/tasks/{id}/edit(id=${task.id})} : @{/tasks/{id}(id=${task.id})}"
                   th:attr="hx-get=${canEdit ? appRoutes.tasks + '/' + task.id + '/edit' : appRoutes.tasks + '/' + task.id}"
                   hx-target="#task-modal-content"
                   hx-swap="innerHTML"
                   class="text-decoration-none"
                   th:classappend="${isCompleted ? 'text-white' : (isInProgress ? 'text-dark' : '')}"
                   th:text="${task.title}">Task Title</a>
            </h5>
            <a href="#" th:if="${isCompleted}" class="badge bg-light text-success text-decoration-none"
               onclick="setStatusFilter('COMPLETED'); return false;">
                <i class="bi bi-check-circle-fill"></i> <span th:text="#{task.status.completed}">Completed</span>
            </a>
            <a href="#" th:if="${overdue}" class="badge bg-danger text-decoration-none text-white"
               onclick="setStatusFilter('overdue'); return false;">
                <i class="bi bi-exclamation-circle-fill"></i> <span th:text="#{task.dueDate.overdue}">Overdue</span>
            </a>
            <a href="#" th:if="${isInProgress && !overdue}" class="badge bg-light text-warning text-decoration-none"
               onclick="setStatusFilter('IN_PROGRESS'); return false;">
                <i class="bi bi-play-circle-fill"></i> <span th:text="#{task.status.inProgress}">In Progress</span>
            </a>
            <a href="#" th:if="${isOpen && !overdue}" class="badge bg-light text-secondary text-decoration-none"
               onclick="setStatusFilter('OPEN'); return false;">
                <i class="bi bi-circle"></i> <span th:text="#{task.status.open}">Open</span>
            </a>
        </div>

        <!-- Card Body -->
        <div class="card-body">
            <p class="card-text" th:text="${task.description} ?: #{task.noDescription}">Description</p>
            <!-- Priority and due date badges -->
            <div class="mb-2">
                <a href="#" th:if="${task.priority.name() == 'HIGH'}" class="badge bg-danger text-decoration-none text-white"
                   onclick="setPriorityFilter('HIGH'); return false;">
                    <i class="bi bi-reception-4"></i> <span th:text="#{task.priority.high}">High</span>
                </a>
                <a href="#" th:if="${task.priority.name() == 'MEDIUM'}" class="badge bg-warning text-dark text-decoration-none"
                   onclick="setPriorityFilter('MEDIUM'); return false;">
                    <i class="bi bi-reception-2"></i> <span th:text="#{task.priority.medium}">Medium</span>
                </a>
                <a href="#" th:if="${task.priority.name() == 'LOW'}" class="badge bg-success text-decoration-none text-white"
                   onclick="setPriorityFilter('LOW'); return false;">
                    <i class="bi bi-reception-1"></i> <span th:text="#{task.priority.low}">Low</span>
                </a>
                <span th:if="${task.dueDate != null}" class="badge"
                      th:classappend="${overdue} ? 'bg-danger' : 'bg-light text-dark'">
                    <i class="bi bi-calendar"></i> <span th:text="${#temporals.format(task.dueDate, 'MMM dd')}">Date</span>
                </span>
            </div>
            <p class="card-text mt-1 mb-0">
                <small class="text-muted">
                    <span th:if="${task.user != null}" class="d-block">
                        <i class="bi bi-person"></i>
                        <a href="#" class="text-muted text-decoration-none user-link"
                           th:data-user-id="${task.user.id}"
                           th:data-user-name="${task.user.name}"
                           onclick="setUserFilter(this.dataset.userId, this.dataset.userName); return false;"
                           th:text="${task.user.name}">User</a>
                    </span>
                    <span class="d-block">
                        <i class="bi bi-calendar"></i>
                        <span th:text="#{task.field.createdAt}">Created</span>: <span th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy')}">Date</span>
                    </span>
                </small>
            </p>
            <div th:if="${task.tags != null && !task.tags.isEmpty()}" class="mt-2">
                <a th:each="tag : ${task.tags}" href="#"
                   class="badge bg-secondary me-1 text-decoration-none text-white"
                   th:data-tag-id="${tag.id}"
                   onclick="toggleTagFilter(this.dataset.tagId); return false;">
                    <i class="bi bi-tag"></i> <span th:text="${tag.name}">Tag</span>
                </a>
            </div>
        </div>

        <!-- Card Footer -->
        <div class="card-footer bg-transparent">
            <div class="d-flex gap-2">
                <!-- Toggle Button (HTMX - swaps this card without page reload) -->
                <button class="btn btn-sm flex-fill"
                        th:classappend="${isCompleted ? 'btn-outline-warning' : (isInProgress ? 'btn-outline-success' : 'btn-outline-primary')}"
                        th:attr="hx-post=${appRoutes.tasks + '/' + task.id + '/toggle?view=cards'},hx-target='#task-card-' + ${task.id}"
                        hx-swap="outerHTML">
                    <i th:classappend="${isCompleted ? 'bi-arrow-counterclockwise' : (isInProgress ? 'bi-check2' : 'bi-play-fill')}"></i>
                    <span th:text="${isCompleted} ? #{action.toggle.completed.next} : (${isInProgress} ? #{action.toggle.inProgress.next} : #{action.toggle.open.next})">Toggle</span>
                </button>

                <!-- View/Edit Button — owners open in edit mode, non-owners in view mode -->
                <a th:href="${canEdit} ? @{/tasks/{id}/edit(id=${task.id})} : @{/tasks/{id}(id=${task.id})}"
                   th:attr="hx-get=${canEdit ? appRoutes.tasks + '/' + task.id + '/edit' : appRoutes.tasks + '/' + task.id}"
                   hx-target="#task-modal-content"
                   hx-swap="innerHTML"
                   class="btn btn-sm btn-outline-primary flex-fill">
                    <i th:class="${canEdit} ? 'bi bi-pencil' : 'bi bi-eye'"></i>
                    <span th:text="${canEdit} ? #{action.editTask} : #{action.viewTask}">Edit</span>
                </a>

                <!-- Delete Button — owners only -->
                <button th:if="${canEdit}" class="btn btn-sm btn-outline-danger flex-fill"
                        data-bs-toggle="modal"
                        data-bs-target="#task-delete-modal"
                        th:data-task-id="${task.id}"
                        th:data-task-title="${task.title}">
                    <i class="bi bi-trash"></i> <span th:text="#{action.delete}">Delete</span>
                </button>
            </div>
        </div>
    </div>
</div>
