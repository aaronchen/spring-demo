<!--/* Modal content — loaded by HTMX into #task-modal-content.
     No HTML wrapper; the whole file is swapped in directly.
     Uses shared task-layout :: columns for the two-column form + checklist/activity layout. */-->
<div class="modal-header" xmlns:th="http://www.thymeleaf.org">
    <div>
        <h5 class="modal-title mb-0">
            <i th:class="${mode == 'view'} ? 'bi bi-eye' : (${mode == 'edit'} ? 'bi bi-pencil-square' : 'bi bi-plus-circle')"></i>
            <span th:text="${mode == 'view'} ? #{task.view.heading} : (${mode == 'edit'} ? #{task.edit.heading} : #{action.newTask})">Task</span>
        </h5>
        <small th:if="${task.project != null && (mode != 'create' || editableProjects == null)}" class="text-muted">
            <i class="bi bi-folder"></i>
            <a th:href="@{/projects/{id}(id=${task.project.id})}"
               class="text-muted text-decoration-none project-link"
               th:text="${task.project.name}">Project</a>
        </small>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<!--/* Stale data banner + WebSocket live update controller */-->
<div th:if="${mode != 'create'}"
     data-controller="tasks--live-update"
     th:data-tasks--live-update-task-id-value="${task.id}"
     th:data-tasks--live-update-project-id-value="${task.project.id}"
     th:data-tasks--live-update-refresh-url-value="${mode == 'edit' ? appRoutes.taskEdit.params('taskId', task.id).build() : appRoutes.taskDetail.params('taskId', task.id).build()}"
     data-tasks--live-update-modal-value="true">
<div id="modal-stale-banner"
     data-tasks--live-update-target="banner"
     class="alert alert-info d-none m-2 mb-0 d-flex align-items-center" role="alert">
    <div>
        <i class="bi bi-arrow-repeat me-1"></i>
        <small th:text="#{task.stale.detail}">This task was modified by another user.</small>
    </div>
    <a href="#" data-action="click->tasks--live-update#refresh"
       class="alert-link ms-auto"
       th:text="#{task.stale.refresh}">Refresh</a>
</div>
</div>
<div class="modal-body p-0">
    <form id="task-form"
          th:action="${mode == 'edit'} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}"
          th:hx-post="${mode == 'edit' ? appRoutes.taskDetail.params('taskId', task.id).build() : appRoutes.tasks}"
          hx-target="#task-modal-content"
          hx-swap="innerHTML"
          th:object="${taskFormRequest}"
          method="post">
        <th:block th:replace="~{tasks/task-layout :: columns}"></th:block>
    </form>
</div>
<!-- Footer -->
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
        <i class="bi bi-x-circle"></i> <span th:text="#{action.cancel}">Cancel</span>
    </button>
    <button th:if="${mode != 'view'}" type="submit" form="task-form" class="btn btn-primary">
        <i th:class="${mode == 'edit'} ? 'bi bi-save' : 'bi bi-plus-circle'"></i>
        <span th:text="${mode == 'edit'} ? #{action.updateTask} : #{action.createTask}">Submit</span>
    </button>
</div>
