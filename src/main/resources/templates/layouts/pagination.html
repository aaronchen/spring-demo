<!-- Reusable pagination control bar fragment.
     Parameters:
       page     — a Spring Data Page<?> object
       position — 'top' or 'bottom' (controls margin direction)
       label    — item noun for the count display (e.g. "tasks", "entries")
     Dispatches custom DOM events instead of calling named JS functions:
       pagination:navigate — detail.page = zero-based page index
       pagination:resize   — detail.size = new page size
-->
<div th:fragment="controlBar(page, position, label)"
     class="d-flex align-items-center"
     th:classappend="${position == 'top' ? 'mb-3' : 'mt-2'}"
     th:with="tp=${page.totalPages},
              cp=${page.number},
              sp=${cp - 2 < 0 ? 0 : cp - 2},
              ep=${cp + 2 >= tp ? tp - 1 : cp + 2}">

    <!-- Left: result count -->
    <div style="flex: 1">
        <small class="text-muted"
               th:text="#{pagination.showing(${cp * page.size + 1}, ${cp * page.size + page.numberOfElements}, ${page.totalElements}, ${label})}">
            Showing 1–25 of 300 items
        </small>
    </div>

    <!-- Middle: pagination -->
    <nav th:if="${tp > 1}" th:attr="aria-label=|Pagination (${position})|">
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${page.first ? 'disabled' : ''}">
                <a class="page-link" href="#"
                   th:onclick="|this.dispatchEvent(new CustomEvent('pagination:navigate', {bubbles:true, detail:{page: ${cp - 1}}})); return false;|">&laquo;</a>
            </li>
            <th:block th:if="${sp > 0}">
                <li class="page-item">
                    <a class="page-link" href="#"
                       onclick="this.dispatchEvent(new CustomEvent('pagination:navigate', {bubbles:true, detail:{page: 0}})); return false;">1</a>
                </li>
                <li class="page-item disabled" th:if="${sp > 1}">
                    <span class="page-link">&hellip;</span>
                </li>
            </th:block>
            <th:block th:each="i : ${#numbers.sequence(sp, ep)}">
                <li class="page-item" th:classappend="${i == cp ? 'active' : ''}">
                    <a class="page-link" href="#"
                       th:text="${i + 1}"
                       th:onclick="|this.dispatchEvent(new CustomEvent('pagination:navigate', {bubbles:true, detail:{page: ${i}}})); return false;|">1</a>
                </li>
            </th:block>
            <th:block th:if="${ep < tp - 1}">
                <li class="page-item disabled" th:if="${ep < tp - 2}">
                    <span class="page-link">&hellip;</span>
                </li>
                <li class="page-item">
                    <a class="page-link" href="#"
                       th:text="${tp}"
                       th:onclick="|this.dispatchEvent(new CustomEvent('pagination:navigate', {bubbles:true, detail:{page: ${tp - 1}}})); return false;|">10</a>
                </li>
            </th:block>
            <li class="page-item" th:classappend="${page.last ? 'disabled' : ''}">
                <a class="page-link" href="#"
                   th:onclick="|this.dispatchEvent(new CustomEvent('pagination:navigate', {bubbles:true, detail:{page: ${cp + 1}}})); return false;|">&raquo;</a>
            </li>
        </ul>
    </nav>

    <!-- Right: per-page selector -->
    <div style="flex: 1" class="d-flex justify-content-end">
        <select class="form-select form-select-sm page-size-select"
                style="width: auto;"
                onchange="this.dispatchEvent(new CustomEvent('pagination:resize', {bubbles:true, detail:{size: parseInt(this.value)}}))">
            <option value="10" th:selected="${page.size == 10}" th:text="#{pagination.perPage(10)}">10 / page</option>
            <option value="25" th:selected="${page.size == 25}" th:text="#{pagination.perPage(25)}">25 / page</option>
            <option value="50" th:selected="${page.size == 50}" th:text="#{pagination.perPage(50)}">50 / page</option>
            <option value="100" th:selected="${page.size == 100}" th:text="#{pagination.perPage(100)}">100 / page</option>
        </select>
    </div>

</div>
