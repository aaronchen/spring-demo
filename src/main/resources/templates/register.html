<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.register}, null)}"></head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{layouts/base :: navbar}"></div>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="col-sm-8 col-md-5 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">
                        <i class="bi bi-person-plus"></i> <span th:text="#{register.heading}">Create Account</span>
                    </h2>

                    <form th:action="@{/register}" th:object="${registrationRequest}" method="post">
                        <!-- Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold"
                                   th:text="#{register.field.name}">Full Name</label>
                            <input type="text" id="name" th:field="*{name}"
                                   class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   th:placeholder="#{register.field.name.placeholder}"
                                   required autofocus>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                                Name error
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold"
                                   th:text="#{login.field.email}">Email</label>
                            <input type="email" id="email" th:field="*{email}"
                                   class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   th:placeholder="#{register.field.email.placeholder}"
                                   required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                                Email error
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold"
                                   th:text="#{login.field.password}">Password</label>
                            <input type="password" id="password" th:field="*{password}"
                                   class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   th:placeholder="#{register.field.password.placeholder}"
                                   required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                                Password error
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-bold"
                                   th:text="#{register.field.confirmPassword}">Confirm Password</label>
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                   class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                   th:placeholder="#{register.field.confirmPassword.placeholder}"
                                   required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
                                Confirm password error
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-person-plus"></i>
                                <span th:text="#{register.submit}">Create Account</span>
                            </button>
                        </div>
                    </form>

                    <p class="text-center mt-3 small">
                        <span th:text="#{register.loginLink}">Already have an account?</span>
                        <a th:href="@{/login}" th:text="#{page.title.login}">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{layouts/base :: footer}"></div>
    <div th:replace="~{layouts/base :: scripts}"></div>
</body>
</html>
