<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.error.409}, null)}"></head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{layouts/base :: navbar}"></div>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="text-center py-5">
            <div class="display-1 fw-bold text-muted">409</div>
            <h2 class="mb-3" th:text="#{error.409.heading}">Conflict</h2>
            <p class="text-muted mb-4" th:text="#{error.409.message}">
                This record was modified by another user. Please reload and try again.
            </p>
            <a th:href="@{/tasks}" class="btn btn-primary">
                <i class="bi bi-list-task"></i> <span th:text="#{action.backToList}">Back to List</span>
            </a>
        </div>
    </main>

    <div th:replace="~{layouts/base :: footer}"></div>
    <div th:replace="~{layouts/base :: scripts}"></div>

</body>
</html>
