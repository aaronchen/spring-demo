<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(${project.name}, '/css/tasks.css')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{layouts/base :: navbar}"></div>

    <main class="container flex-grow-1 pb-4">
        <div class="row">
            <div class="col-12">
                <!-- Back link -->
                <a th:href="@{/projects}" class="text-decoration-none mb-3 d-inline-block">
                    <i class="bi bi-arrow-left"></i> <span th:text="#{project.heading}">Projects</span>
                </a>

                <!-- Project Header -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div>
                        <h1 class="display-4" th:text="${project.name}">Project Name</h1>
                        <p class="text-muted mb-0" th:if="${project.description}" th:text="${project.description}">Description</p>
                        <span th:if="${project.status.name() == 'ARCHIVED'}" class="badge bg-secondary">
                            <i class="bi bi-archive"></i>
                            <span th:text="#{project.status.archived}">Archived</span>
                        </span>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:if="${isProjectOwner}" th:href="@{/projects/{id}/settings(id=${project.id})}"
                           class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-gear"></i> <span th:text="#{project.action.settings}">Settings</span>
                        </a>
                    </div>
                </div>

                <!-- Members bar -->
                <div class="mb-4">
                    <small class="text-muted">
                        <i class="bi bi-people me-1"></i>
                        <span th:each="member, iter : ${projectMembers}">
                            <span th:text="${member.user.name}">Name</span>
                            <span class="badge bg-light text-dark" th:text="#{${'project.role.' + member.role.name().toLowerCase()}}">Role</span>
                            <span th:unless="${iter.last}">&middot; </span>
                        </span>
                    </small>
                </div>

                <!-- Task List Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 th:text="#{project.tasks.heading}">Tasks</h2>
                    <button th:if="${canEditProject}" class="btn btn-primary btn-lg"
                            th:attr="hx-get=${appRoutes.tasks + '/new?projectId=' + project.id}"
                            hx-target="#task-modal-content"
                            hx-swap="innerHTML">
                        <i class="bi bi-plus-circle"></i> <span th:text="#{action.newTask}">New Task</span>
                    </button>
                </div>

                <div th:replace="~{tasks/task-list-fragment}"></div>
            </div>
        </div>
    </main>

    <div th:replace="~{layouts/base :: footer}"></div>
    <div th:replace="~{layouts/base :: scripts}"></div>

    <!--/* Set project-scoped base URL for tasks.js */-->
    <script th:inline="javascript">
        window.TASKS_BASE_OVERRIDE = /*[[${appRoutes.projects + '/' + project.id}]]*/ '/projects/1';
    </script>
    <script th:src="@{/js/task-form.js}"></script>
    <script th:src="@{/js/tasks.js}"></script>
</body>
</html>
