<!--/* Bare fragment — returned by HTMX after recurring template CRUD.
     Also included from project-settings.html via th:replace. */-->
<div id="recurring-panel-content" xmlns:th="http://www.thymeleaf.org">

    <!-- Error Alert -->
    <div th:if="${recurringError}" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
        <span th:text="${recurringError}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Recurring Template Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header">
            <h5 class="mb-0"
                th:text="${editTemplate != null} ? #{recurring.action.edit} : #{recurring.action.create}">Create Recurring Task</h5>
        </div>
        <div class="card-body">
            <form th:object="${recurringRequest}"
                  th:with="formUrl=${editTemplate != null}
                      ? ${appRoutes.projectRecurringDetail.params('projectId', project.id, 'templateId', editTemplate.id).build()}
                      : ${appRoutes.projectRecurringTemplates.params('projectId', project.id).build()}"
                  th:hx-post="${formUrl}"
                  hx-target="#recurring-panel-content"
                  hx-swap="outerHTML">
                <div class="row g-2">
                    <!-- Title -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold form-label-required"
                               th:text="#{task.field.title}">Title</label>
                        <input type="text" class="form-control form-control-sm" th:field="*{title}"
                               th:placeholder="#{task.field.title}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                             th:errors="*{title}">Title error</div>
                    </div>
                    <!-- Description -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold" th:text="#{task.field.description}">Description</label>
                        <input type="text" class="form-control form-control-sm" th:field="*{description}"
                               th:placeholder="#{task.field.description}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                             th:errors="*{description}">Description error</div>
                    </div>
                    <!-- Recurrence -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold form-label-required"
                               th:text="#{recurring.field.recurrence}">Recurrence</label>
                        <select class="form-select form-select-sm" th:field="*{recurrence}"
                                onchange="updateRecurrenceFields()">
                            <option th:each="r : ${T(cc.desuka.demo.model.Recurrence).values()}"
                                    th:value="${r}"
                                    th:text="#{${r.messageKey}}">Recurrence</option>
                        </select>
                    </div>
                    <!-- Day of Week (WEEKLY/BIWEEKLY) -->
                    <div class="col-md-3" id="rt-dayOfWeek-group"
                         th:classappend="${recurringRequest.recurrence == null
                             || (recurringRequest.recurrence.name() != 'WEEKLY'
                                 && recurringRequest.recurrence.name() != 'BIWEEKLY')} ? 'd-none'">
                        <label class="form-label fw-bold" th:text="#{recurring.field.dayOfWeek}">Day of Week</label>
                        <select class="form-select form-select-sm" th:field="*{dayOfWeek}">
                            <option value="" th:text="#{recurring.field.dayOfWeek.any}">Any</option>
                            <option value="1" th:text="#{recurring.dayOfWeek.monday}">Monday</option>
                            <option value="2" th:text="#{recurring.dayOfWeek.tuesday}">Tuesday</option>
                            <option value="3" th:text="#{recurring.dayOfWeek.wednesday}">Wednesday</option>
                            <option value="4" th:text="#{recurring.dayOfWeek.thursday}">Thursday</option>
                            <option value="5" th:text="#{recurring.dayOfWeek.friday}">Friday</option>
                            <option value="6" th:text="#{recurring.dayOfWeek.saturday}">Saturday</option>
                            <option value="7" th:text="#{recurring.dayOfWeek.sunday}">Sunday</option>
                        </select>
                    </div>
                    <!-- Day of Month (MONTHLY) -->
                    <div class="col-md-3" id="rt-dayOfMonth-group"
                         th:classappend="${recurringRequest.recurrence == null
                             || recurringRequest.recurrence.name() != 'MONTHLY'} ? 'd-none'">
                        <label class="form-label fw-bold" th:text="#{recurring.field.dayOfMonth}">Day of Month</label>
                        <input type="number" class="form-control form-control-sm" th:field="*{dayOfMonth}"
                               min="1" max="31">
                    </div>
                    <!-- Priority -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold" th:text="#{task.field.priority}">Priority</label>
                        <select class="form-select form-select-sm" th:field="*{priority}">
                            <option th:each="p : ${T(cc.desuka.demo.model.Priority).values()}"
                                    th:value="${p}"
                                    th:text="#{${p.messageKey}}">Priority</option>
                        </select>
                    </div>
                    <!-- Assignee -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold" th:text="#{task.field.user}">Assignee</label>
                        <select class="form-select form-select-sm" th:field="*{assigneeId}">
                            <option value="" th:text="#{task.field.user.unassigned}">Unassigned</option>
                            <th:block th:each="member : ${projectMembers}">
                                <option th:if="${member.role.name() != 'VIEWER' && member.user.enabled}"
                                        th:value="${member.user.id}"
                                        th:text="${member.user.name}">Member</option>
                            </th:block>
                        </select>
                    </div>
                    <!-- Force new row -->
                    <div class="w-100"></div>
                    <!-- Next Run Date -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold form-label-required"
                               th:text="#{recurring.field.nextRunDate}">Next Run Date</label>
                        <input type="date" class="form-control form-control-sm date-range-start" th:field="*{nextRunDate}"
                               data-date-min-for="recurring-endDate" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nextRunDate')}"
                             th:errors="*{nextRunDate}">Date error</div>
                    </div>
                    <!-- End Date -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold" th:text="#{recurring.field.endDate}">End Date</label>
                        <input type="date" class="form-control form-control-sm" th:field="*{endDate}"
                               id="recurring-endDate">
                    </div>
                    <!-- Due Days After -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold" th:text="#{recurring.field.dueDaysAfter}">Due Days After</label>
                        <input type="number" class="form-control form-control-sm" th:field="*{dueDaysAfter}"
                               min="0" max="365">
                    </div>
                    <!-- Effort -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold" th:text="#{task.field.effort}">Effort</label>
                        <input type="number" class="form-control form-control-sm" th:field="*{effort}"
                               min="0" max="32767">
                    </div>
                    <!-- Tags -->
                    <div class="col-12" th:if="${allTags != null && !allTags.isEmpty()}">
                        <label class="form-label fw-bold" th:text="#{task.field.tags}">Tags</label>
                        <div class="d-flex flex-wrap gap-2">
                            <div class="form-check" th:each="tag : ${allTags}">
                                <input class="form-check-input" type="checkbox"
                                       name="tagIds"
                                       th:value="${tag.id}"
                                       th:id="${'rt-tag-' + tag.id}"
                                       th:checked="${recurringRequest.tagIds != null && recurringRequest.tagIds.contains(tag.id)}">
                                <label class="form-check-label" th:for="${'rt-tag-' + tag.id}"
                                       th:text="${tag.name}">Tag</label>
                            </div>
                        </div>
                    </div>
                    <!-- Buttons -->
                    <div class="col-12 d-flex gap-2 mt-2">
                        <button type="submit" class="btn btn-sm btn-primary">
                            <i class="bi bi-check-circle"></i>
                            <span th:text="${editTemplate != null} ? #{action.save} : #{recurring.action.create}">Create</span>
                        </button>
                        <button th:if="${editTemplate != null}" type="button"
                                class="btn btn-sm btn-outline-secondary"
                                th:hx-get="${appRoutes.projectRecurringPanel.params('projectId', project.id).build()}"
                                hx-target="#recurring-panel-content"
                                hx-swap="outerHTML">
                            <i class="bi bi-x-circle"></i> <span th:text="#{action.cancel}">Cancel</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Template List -->
    <div class="card shadow-sm">
        <div class="card-header">
            <h5 class="mb-0" th:text="#{recurring.heading}">Recurring Tasks</h5>
        </div>
        <div class="card-body">
            <div th:if="${recurringTemplates == null || recurringTemplates.isEmpty()}"
                 class="text-muted text-center py-3"
                 th:text="#{recurring.empty}">No recurring task templates.</div>
            <div th:if="${recurringTemplates != null && !recurringTemplates.isEmpty()}" class="table-responsive">
                <table class="table table-sm align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:text="#{task.field.title}">Title</th>
                            <th th:text="#{recurring.field.recurrence}">Recurrence</th>
                            <th th:text="#{task.field.user}">Assignee</th>
                            <th th:text="#{recurring.field.nextRunDate}">Next Run</th>
                            <th>Status</th>
                            <th style="width: 1px; white-space: nowrap;" th:text="#{project.member.table.actions}">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tmpl : ${recurringTemplates}">
                            <td>
                                <span th:text="${tmpl.title}">Template</span>
                                <small th:if="${tmpl.description != null}" class="d-block text-muted"
                                       th:text="${#strings.abbreviate(tmpl.description, 60)}">Description</small>
                            </td>
                            <td>
                                <span class="badge bg-info" th:text="#{${tmpl.recurrence.messageKey}}">Daily</span>
                            </td>
                            <td>
                                <small th:if="${tmpl.assignee != null}" th:text="${tmpl.assignee.name}">Assignee</small>
                                <small th:if="${tmpl.assignee == null}" class="text-muted">&mdash;</small>
                            </td>
                            <td class="text-nowrap">
                                <small th:text="${#temporals.format(tmpl.nextRunDate, 'MMM dd, yyyy')}">Date</small>
                            </td>
                            <td>
                                <span th:if="${tmpl.enabled}" class="badge bg-success"
                                      th:text="#{recurring.status.enabled}">Enabled</span>
                                <span th:if="${!tmpl.enabled}" class="badge bg-secondary"
                                      th:text="#{recurring.status.disabled}">Disabled</span>
                            </td>
                            <td class="text-nowrap">
                                <button class="btn btn-sm btn-outline-primary me-1"
                                        th:hx-get="${appRoutes.projectRecurringEdit.params('projectId', project.id, 'templateId', tmpl.id).build()}"
                                        hx-target="#recurring-panel-content"
                                        hx-swap="outerHTML"
                                        th:title="#{recurring.action.edit}">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-success me-1"
                                        th:if="${tmpl.enabled}"
                                        th:hx-post="${appRoutes.projectRecurringGenerate.params('projectId', project.id, 'templateId', tmpl.id).build()}"
                                        hx-target="#recurring-panel-content"
                                        hx-swap="outerHTML"
                                        th:title="#{recurring.action.generate}">
                                    <i class="bi bi-play-fill"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-secondary me-1"
                                        th:hx-post="${appRoutes.projectRecurringToggle.params('projectId', project.id, 'templateId', tmpl.id).build()}"
                                        hx-target="#recurring-panel-content"
                                        hx-swap="outerHTML"
                                        th:title="${tmpl.enabled} ? #{recurring.action.disable} : #{recurring.action.enable}">
                                    <i class="bi" th:classappend="${tmpl.enabled ? 'bi-pause-circle' : 'bi-play-circle'}"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger"
                                        th:hx-delete="${appRoutes.projectRecurringDetail.params('projectId', project.id, 'templateId', tmpl.id).build()}"
                                        th:hx-confirm="#{recurring.confirm.delete}"
                                        th:data-confirm-title="#{recurring.action.delete}"
                                        th:data-confirm-text="#{recurring.action.delete}"
                                        data-confirm-header-class="bg-danger text-white"
                                        data-confirm-btn-class="btn btn-danger"
                                        hx-target="#recurring-panel-content"
                                        hx-swap="outerHTML"
                                        th:title="#{recurring.action.delete}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!--/* Recurrence field visibility toggle — pure client-side UI */-->
    <script>
        function updateRecurrenceFields() {
            const recurrence = document.querySelector('[name="recurrence"]').value;
            const dowGroup = document.getElementById('rt-dayOfWeek-group');
            const domGroup = document.getElementById('rt-dayOfMonth-group');

            const showDow = recurrence === 'WEEKLY' || recurrence === 'BIWEEKLY';
            const showDom = recurrence === 'MONTHLY';

            dowGroup.classList.toggle('d-none', !showDow);
            domGroup.classList.toggle('d-none', !showDom);

            if (!showDow) document.querySelector('[name="dayOfWeek"]').value = '';
            if (!showDom) document.querySelector('[name="dayOfMonth"]').value = '';
        }
    </script>
</div>
