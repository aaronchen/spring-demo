<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.tags}, null)}"></head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{layouts/base :: navbar}"></div>

    <main class="container flex-grow-1 mb-4">
        <h1 class="display-4 mb-4" th:text="#{tag.list.heading}">Tags</h1>

        <div class="card shadow overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:text="#{tag.table.column.id}">ID</th>
                            <th th:text="#{tag.table.column.name}">Name</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tag : ${tags}">
                            <td th:text="${tag.id}">1</td>
                            <td>
                                <a th:href="@{/tasks(tags=${tag.id}, userId='')}" class="badge bg-primary text-decoration-none" th:text="${tag.name}">Tag</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(tags)}">
                            <td colspan="2" class="text-center text-muted py-4" th:text="#{tag.empty}">No tags found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div th:replace="~{layouts/base :: footer}"></div>
    <div th:replace="~{layouts/base :: scripts}"></div>
</body>
</html>
