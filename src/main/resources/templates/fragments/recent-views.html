<!--/* Recently Viewed — vertical tab on left edge, lg+ only.
     Panel slides out to the right; live updates via WebSocket. */-->
<div id="recent-views-wrapper"
     data-controller="recent-views"
     xmlns:th="http://www.thymeleaf.org">
    <!-- Panel -->
    <div id="recent-views-panel" data-recent-views-target="panel" class="card shadow d-none">
        <div id="recent-views-empty" data-recent-views-target="empty" class="px-3 py-3 text-muted small text-center">
            <i class="bi bi-clock me-1"></i>
            <span th:text="#{recentlyViewed.empty}">No recently viewed items.</span>
        </div>
        <div data-recent-views-target="list" class="list-group list-group-flush"></div>
    </div>
    <!-- Vertical tab -->
    <a href="#" data-recent-views-target="toggle" class="drawer-tab recent-views-tab shadow-sm"
       data-action="click->recent-views#toggle">
        <i class="bi bi-clock-history"></i>
        <span th:text="#{recentlyViewed.heading}">Recently Viewed</span>
    </a>
</div>
