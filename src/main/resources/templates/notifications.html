<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(#{page.title.notifications}, null)}"></head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{layouts/base :: navbar}"></div>

    <main class="container flex-grow-1 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-5 mb-0" th:text="#{page.title.notifications}">Notifications</h1>
            <button id="clear-all-btn"
                    th:if="${!notifications.isEmpty()}"
                    class="btn btn-outline-danger btn-sm"
                    hx-delete="/api/notifications"
                    th:attr="hx-confirm=#{notification.clearAll.confirm},
                             data-confirm-title=#{notification.clearAll.title},
                             data-confirm-text=#{notification.clearAll.action}"
                    data-confirm-class="btn btn-danger"
                    data-confirm-header="bg-danger text-white"
                    th:text="#{notification.clearAll}">Clear All</button>
        </div>

        <!-- Empty state -->
        <div id="page-empty" class="text-center text-muted py-5"
             th:classappend="${!notifications.isEmpty()} ? 'd-none' : ''">
            <i class="bi bi-bell-slash" style="font-size: 3rem;"></i>
            <p class="mt-3" th:text="#{notification.empty}">No notifications</p>
        </div>

        <!-- Notification list -->
        <div id="page-list" class="list-group shadow-sm"
             th:classappend="${notifications.isEmpty()} ? 'd-none' : ''">
            <div th:each="n : ${notifications.content}"
                 class="list-group-item list-group-item-action"
                 th:classappend="${!n.read} ? 'list-group-item-light fw-semibold' : ''"
                 style="cursor: pointer;"
                 th:data-id="${n.id}"
                 th:attr="hx-patch=${'/api/notifications/' + n.id + '/read'}, hx-swap='none'">
                <div class="d-flex align-items-start py-1">
                    <i class="bi me-3 mt-1"
                       th:classappend="${n.type == 'TASK_ASSIGNED'} ? 'bi-person-plus text-primary' :
                                       (${n.type == 'COMMENT_ADDED'} ? 'bi-chat-dots text-success' :
                                       (${n.type == 'TASK_OVERDUE'} ? 'bi-clock text-danger' : 'bi-megaphone text-warning'))"></i>
                    <div class="flex-grow-1">
                        <div th:text="${n.message}">Notification message</div>
                        <small class="text-muted" th:text="${#temporals.format(n.createdAt, 'MMM d, yyyy h:mm a')}">Mar 12, 2026 3:00 PM</small>
                    </div>
                    <a th:if="${n.link != null}" th:href="@{${n.link}}"
                       class="text-muted ms-2 align-self-center flex-shrink-0">
                        <i class="bi bi-box-arrow-up-right"></i>
                    </a>
                    <span th:if="${!n.read}" class="badge bg-primary ms-2 align-self-center"
                          th:text="#{notification.new}">New</span>
                </div>
            </div>
        </div>

        <!--/* Pagination */-->
        <div th:if="${notifications.totalPages > 1}" class="mt-4">
            <nav>
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${notifications.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/notifications(page=${notifications.number - 1}, size=${notifications.size})}">&laquo;</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, notifications.totalPages - 1)}"
                        class="page-item" th:classappend="${i == notifications.number} ? 'active'">
                        <a class="page-link" th:href="@{/notifications(page=${i}, size=${notifications.size})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${notifications.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/notifications(page=${notifications.number + 1}, size=${notifications.size})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>

    <div th:replace="~{layouts/base :: footer}"></div>
    <div th:replace="~{layouts/base :: scripts}"></div>

    <script>
        const pageList = document.getElementById('page-list');
        const pageEmpty = document.getElementById('page-empty');
        const helpers = window.notificationHelpers;

        // ── Producers: fire events from HTMX actions ────────────────────────

        document.body.addEventListener('htmx:afterRequest', function(e) {
            const el = e.detail.elt;
            if (el.getAttribute('hx-delete') === '/api/notifications') {
                helpers.fire('notification:cleared');
                return;
            }
            if (el.getAttribute('hx-patch')?.includes('/read')) {
                el.classList.remove('list-group-item-light', 'fw-semibold');
                const badge = el.querySelector('.badge');
                if (badge) badge.remove();
                helpers.fire('notification:read', { id: el.dataset.id });
            }
        });

        // ── Consumers: react to events ──────────────────────────────────────

        // New notification arrived via WebSocket — prepend to page list
        document.addEventListener('notification:received', function(e) {
            const n = e.detail;
            pageEmpty.classList.add('d-none');
            pageList.classList.remove('d-none');

            const icon = helpers.getIcon(n.type);
            const actionLink = n.link
                ? `<a href="${n.link}" class="text-muted ms-2 align-self-center flex-shrink-0"><i class="bi bi-box-arrow-up-right"></i></a>`
                : '';

            const row = document.createElement('div');
            row.className = 'list-group-item list-group-item-action list-group-item-light fw-semibold';
            row.style.cursor = 'pointer';
            row.dataset.id = n.id;
            row.setAttribute('hx-patch', `/api/notifications/${n.id}/read`);
            row.setAttribute('hx-swap', 'none');
            htmx.process(row);

            row.innerHTML = `<div class="d-flex align-items-start py-1">
                <i class="bi ${icon} me-3 mt-1"></i>
                <div class="flex-grow-1">
                    <div>${helpers.escapeHtml(n.message)}</div>
                    <small class="text-muted">${helpers.formatTime(n.createdAt)}</small>
                </div>
                ${actionLink}
                <span class="badge bg-primary ms-2 align-self-center">${APP_CONFIG.messages['notification.new']}</span>
            </div>`;

            pageList.prepend(row);

            // Show clear all button if it was hidden
            const clearBtn = document.getElementById('clear-all-btn');
            if (clearBtn) clearBtn.classList.remove('d-none');
        });

        // All cleared — show empty state
        document.addEventListener('notification:cleared', function() {
            pageList.innerHTML = '';
            pageList.classList.add('d-none');
            pageEmpty.classList.remove('d-none');
            const clearBtn = document.getElementById('clear-all-btn');
            if (clearBtn) clearBtn.classList.add('d-none');
        });

        // Single notification marked read (from dropdown) — update page row
        document.addEventListener('notification:read', function(e) {
            const row = pageList.querySelector(`[data-id="${e.detail.id}"]`);
            if (row) {
                row.classList.remove('list-group-item-light', 'fw-semibold');
                const badge = row.querySelector('.badge');
                if (badge) badge.remove();
            }
        });

        // All marked as read (from dropdown) — update page rows
        document.addEventListener('notification:allRead', function() {
            pageList.querySelectorAll('.list-group-item').forEach(function(el) {
                el.classList.remove('list-group-item-light', 'fw-semibold');
                const badge = el.querySelector('.badge');
                if (badge) badge.remove();
            });
        });
    </script>
</body>
</html>
