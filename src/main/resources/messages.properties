# ================================================================
# messages.properties — UI display strings
# Spring Boot auto-discovers this file; no extra configuration needed.
# Use #{key} in Thymeleaf templates to reference these values.
#
# Namespace rules:
#   action.*      — generic actions reusable across any feature (Save, Cancel, Delete...)
#   pagination.*  — pagination controls, reusable for any paginated list
#   nav.*         — navigation bar
#   footer.*      — footer
#   page.title.*  — HTML <title> tag values
#   task.*        — everything specific to the Task feature
# ================================================================

