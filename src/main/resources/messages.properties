# ================================================================
# messages.properties — UI display strings
# Spring Boot auto-discovers this file; no extra configuration needed.
# Use #{key} in Thymeleaf templates to reference these values.
#
# Namespace rules:
#   action.*      — generic actions reusable across any feature (Save, Cancel, Delete...)
#   pagination.*  — pagination controls, reusable for any paginated list
#   nav.*         — navigation bar
#   footer.*      — footer
#   page.title.*  — HTML <title> tag values
#   task.*        — everything specific to the Task feature
# ================================================================

# ----- Application -----
app.name=Spring Workshop

# ----- Navigation -----
nav.brand=Spring Workshop
nav.tasks=Tasks

# ----- Footer -----
footer.text=Spring Workshop \u00A9 2026 | Built with Spring Boot / Bootstrap / HTMX

# ----- Page titles (used in <title> tag via head fragment) -----
page.title.tasks=Spring Workshop - Tasks
page.title.task.create=Create Task
page.title.task.edit=Edit Task

# ----- Generic actions (reusable across features) -----
action.cancel=Cancel
action.delete=Delete
action.backToList=Back to List
action.editTask=Edit Task
action.newTask=New Task
action.createTask=Create Task
action.updateTask=Update Task
action.markAsCompleted=Mark as completed
action.toggle.complete=Complete
action.toggle.undo=Undo
action.toggle.markComplete=Mark as complete
action.toggle.markPending=Mark as pending

# ----- Pagination (reusable for any paginated list) -----
# {0} = first item number, {1} = last item number, {2} = total count
pagination.showing=Showing {0}\u2013{1} of {2} tasks
# {0} = page size number
pagination.perPage={0} / page

# ================================================================
# Task feature
# ================================================================

# ----- Task page headings -----
task.list.heading=Tasks
task.create.heading=Create New Task
task.edit.heading=Edit Task

# ----- Task field labels -----
task.field.title=Title
task.field.description=Description
task.field.completed=Completed
task.field.status=Status
task.field.createdAt=Created

# ----- Task field placeholders -----
task.field.title.placeholder=Enter task title
task.field.description.placeholder=Enter task description (optional)

# ----- Task status badges -----
task.status.completed=Completed
task.status.pending=Pending

# ----- Task card / row -----
task.noDescription=No description

# ----- Task search -----
task.search.placeholder=Search tasks by title or description...

# ----- Task filter buttons -----
task.filter.all=All
task.filter.completed=Completed
task.filter.pending=Pending

# ----- Task sort options -----
task.sort.newestFirst=Newest First
task.sort.title.asc=Title (A-Z)
task.sort.title.desc=Title (Z-A)
task.sort.createdAt.asc=Oldest First
task.sort.createdAt.desc=Newest First
task.sort.description.asc=Description (A-Z)
task.sort.description.desc=Description (Z-A)
task.sort.default=Default

# ----- Task table column headers -----
task.table.column.title=Title
task.table.column.status=Status
task.table.column.created=Created
task.table.column.description=Description
task.table.column.actions=Actions

# ----- Task empty state -----
